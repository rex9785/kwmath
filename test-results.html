<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>테스트 결과 | 이관우 수학연구소</title>
<link rel="manifest" href="/manifest.json?v=3">
<meta name="theme-color" content="#8B1A35">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=6">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--primary:#8B1A35;--primary-light:#F9EEF1;--primary-mid:#B02347;--text:#1E1E1E;--text-light:#666;--bg:#FFF;--bg2:#FAF7F8;--border:#EDE0E3;}
  body{font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg2);min-height:100vh;word-break:keep-all;overflow-wrap:break-word;line-break:strict;}
  .topbar{background:var(--primary);color:#fff;padding:max(14px,env(safe-area-inset-top,14px)) 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .topbar-title{font-size:0.95rem;font-weight:900;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px;text-decoration:none;color:#fff;}
  .topbar-title .logo-mark{display:inline-flex;align-items:center;justify-content:center;width:30px;height:26px;background:#fff;border-radius:6px;overflow:hidden;padding:0;}
  .topbar-title .logo-mark img{width:100%;height:100%;object-fit:cover;display:block;}
  .topbar-btn{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);color:#fff;padding:6px 12px;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;}
  .topbar-btn:hover{background:rgba(255,255,255,0.26);}

  .page{max-width:640px;margin:0 auto;padding:24px 18px 80px;}

  .student-bar{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .student-bar .info{font-size:0.92rem;font-weight:700;color:var(--text);}
  .student-bar .info .meta{display:block;font-size:0.75rem;font-weight:500;color:var(--text-light);margin-top:2px;}
  .student-bar select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.85rem;font-family:inherit;background:#fff;outline:none;}

  .section-label{font-size:0.78rem;font-weight:700;color:var(--primary);letter-spacing:0.5px;margin-bottom:10px;text-transform:uppercase;}

  .intro-card{background:linear-gradient(135deg,#fff 0%,var(--primary-light) 100%);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:16px;}
  .intro-card h2{font-size:0.96rem;font-weight:800;color:var(--primary);margin-bottom:4px;}
  .intro-card p{font-size:0.83rem;color:var(--text);line-height:1.6;}

  .pdf-item{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:8px;gap:12px;}
  .pdf-info{flex:1;min-width:0;}
  .pdf-name{font-size:0.88rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;}
  .pdf-meta{font-size:0.74rem;color:var(--text-light);margin-top:3px;}
  .pdf-dl-btn{background:var(--primary);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;text-decoration:none;}
  .pdf-dl-btn:hover{background:var(--primary-mid);}

  /* 공부량 카드 + 미니 차트 */
  .study-card{background:linear-gradient(135deg,#fff 0%,var(--primary-light) 100%);border:1.5px solid var(--primary);border-radius:14px;padding:16px 18px;margin-bottom:16px;}
  .study-card .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .study-card .head h2{font-size:0.92rem;font-weight:800;color:var(--primary);}
  .study-card .head a{font-size:0.76rem;color:var(--primary);text-decoration:none;font-weight:600;}
  .study-card .stats{display:flex;gap:14px;align-items:flex-end;margin-bottom:10px;}
  .study-card .stats .big{font-size:1.5rem;font-weight:900;color:var(--primary);}
  .study-card .stats .sub{font-size:0.78rem;color:var(--text-light);font-weight:600;}
  .mini-chart{width:100%;height:60px;display:block;}
  .mini-bar{fill:var(--primary);opacity:0.85;}
  .mini-bar.empty{fill:#EBEDF0;}
  .mini-axis{font-size:8.5px;fill:var(--text-light);font-family:inherit;}

  /* 테스트 결과 — 한 줄 접힘 → 누르면 문항별 정오 펼침 */
  .quiz-item{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;}
  .quiz-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;}
  .quiz-head .t{flex:1;min-width:0;font-size:0.88rem;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .quiz-head .t small{color:var(--text-light);font-weight:500;}
  .quiz-head .s{font-size:0.98rem;font-weight:900;color:var(--primary);white-space:nowrap;flex-shrink:0;}
  .quiz-head .arrow{color:var(--text-light);font-size:0.75rem;flex-shrink:0;transition:transform .15s;}
  .quiz-item.open .arrow{transform:rotate(90deg);}
  .quiz-pend{display:inline-block;background:#FEF7E0;color:#B26A00;font-size:0.68rem;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px;vertical-align:middle;}
  .quiz-body{display:none;border-top:1px solid var(--border);padding:12px 18px 14px;background:#FDFBFC;}
  .quiz-item.open .quiz-body{display:block;}
  .quiz-split{font-size:0.85rem;font-weight:700;color:var(--text);margin-bottom:4px;}
  .quiz-note{font-size:0.76rem;color:#B26A00;margin-bottom:8px;}
  .qr-q{border-top:1px dashed var(--border);padding:9px 0;font-size:0.82rem;line-height:1.55;}
  .qr-q:first-of-type{border-top:none;}
  .qr-q .ql{font-weight:600;color:var(--text);}
  .qr-badge{display:inline-block;font-size:0.72rem;font-weight:800;padding:1px 8px;border-radius:99px;margin-left:6px;white-space:nowrap;}
  .qr-badge.o{background:#E6F4EA;color:#137333;}
  .qr-badge.x{background:#FCE8E6;color:#C5221F;}
  .qr-badge.p{background:#FEF7E0;color:#B26A00;}
  .qr-ans{color:var(--text-light);margin-top:2px;}
  .qr-ans b{color:var(--text);font-weight:600;}
  .qr-correct{color:#137333;margin-top:1px;}

  /* 오답 재도전(쌍둥이) — 클리닉에서 틀린 문항의 쌍둥이 답 재입력 */
  .twin-wrap{border-top:1px dashed var(--border);margin-top:10px;padding-top:12px;display:flex;align-items:center;flex-wrap:wrap;gap:6px 0;}
  .twin-btn{background:var(--primary);color:#fff;border:none;padding:9px 16px;border-radius:9px;font-size:0.83rem;font-weight:800;cursor:pointer;font-family:inherit;}
  .twin-btn:hover{background:var(--primary-mid);}
  .twin-score{font-size:0.8rem;font-weight:800;color:var(--primary);margin-left:10px;}
  .twin-box{flex-basis:100%;margin-top:12px;background:#fff;border:1.5px solid var(--primary-light);border-radius:10px;padding:12px 14px;}
  .twin-intro{font-size:0.78rem;color:var(--text-light);line-height:1.55;margin-bottom:10px;}
  .twin-q{border-top:1px dashed var(--border);padding:10px 0;}
  .twin-q:first-of-type{border-top:none;padding-top:0;}
  .twin-ql{font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.5;}
  .twin-badge{display:inline-block;font-size:0.72rem;font-weight:800;padding:1px 8px;border-radius:99px;margin-left:6px;white-space:nowrap;}
  .twin-badge.o{background:#E6F4EA;color:#137333;}
  .twin-badge.x{background:#FCE8E6;color:#C5221F;}
  .twin-text{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;font-family:inherit;outline:none;}
  .twin-text:focus{border-color:var(--primary);}
  .twin-mf{width:100%;font-size:1rem;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;background:#fff;}
  .twin-correct{font-size:0.78rem;color:#137333;margin-top:5px;}
  .twin-submit{margin-top:12px;width:100%;background:var(--primary);color:#fff;border:none;padding:11px;border-radius:9px;font-size:0.88rem;font-weight:800;cursor:pointer;font-family:inherit;}
  .twin-submit:hover{background:var(--primary-mid);}
  .twin-submit:disabled{opacity:0.6;cursor:default;}

  .empty-state{background:#fff;border:1px dashed var(--border);border-radius:14px;padding:36px 18px;text-align:center;color:var(--text-light);font-size:0.88rem;line-height:1.7;}
  .empty-state .icon{font-size:2rem;margin-bottom:10px;display:block;}
  .empty-state b{color:var(--primary);}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a0a0f;color:#fff;padding:11px 22px;border-radius:10px;font-size:0.86rem;opacity:0;transition:opacity .25s;z-index:9999;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <a href="/portal" class="topbar-title">
    <span class="logo-mark"><img src="/icons/icon-192.png?v=6" alt="이관우 수학연구소"></span>
    <span>📊 테스트 결과</span>
  </a>
  <a href="/portal" class="topbar-btn">← 포털</a>
</div>

<div class="page">

  <div id="loading" class="empty-state">불러오는 중...</div>

  <div id="content" style="display:none;">
    <div class="student-bar" id="studentBar">
      <div class="info" id="studentInfo"></div>
      <select id="childSelect" style="display:none;" onchange="onChildChange()"></select>
    </div>

    <div id="studyCard" class="study-card" style="display:none;">
      <div class="head">
        <h2>📚 이번 달 공부량</h2>
        <a href="/study">자세히 →</a>
      </div>
      <div class="stats">
        <div><div class="big" id="scAvg">—</div><div class="sub">하루 평균</div></div>
        <div><div class="big" id="scTotal">—</div><div class="sub">이번 달 누계</div></div>
      </div>
      <svg id="miniChart" class="mini-chart" viewBox="0 0 600 60" preserveAspectRatio="none"></svg>
      <div style="font-size:0.72rem;color:var(--text-light);margin-top:4px;text-align:right;">최근 14일</div>
    </div>

    <div class="intro-card">
      <h2>📊 학습 진단 결과</h2>
      <p>매주·매월 진행한 학습 진단 보고서(원클릭 보고서, 모의고사·내신 등급)가 여기에 누적됩니다. 시간이 지나면서 성적이 어떻게 변하는지 한눈에 볼 수 있어요.</p>
    </div>

    <div id="quizSection" style="display:none;margin-bottom:22px;">
      <div class="section-label">📝 테스트 결과</div>
      <div id="quizList"></div>
    </div>

    <div class="section-label">📁 결과 보고서</div>
    <div id="pdfList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const TOKEN_KEY = 'kwmath_portal_token';
  const PHONE_KEY = 'kwmath_portal_phone';
  let token = '';
  try { token = sessionStorage.getItem(TOKEN_KEY) || localStorage.getItem(TOKEN_KEY) || ''; } catch (e) {}
  if (!token) { location.replace('/portal?next=/test-results'); }

  let students = [];
  let selected = null;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._h);
    t._h = setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function loadMe() {
    try {
      const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        try { localStorage.removeItem(TOKEN_KEY); } catch(e){}
        location.replace('/portal?next=/test-results');
        return;
      }
      students = Array.isArray(data.students) ? data.students : [];
      if (!students.length) {
        document.getElementById('loading').innerHTML = '<span class="icon">😕</span>이 휴대폰에 연결된 학생이 없습니다.<br>관우T께 문의해주세요.';
        return;
      }
      // 자녀 선택 (sessionStorage 우선)
      let initIdx = 0;
      try {
        const saved = JSON.parse(sessionStorage.getItem('kwmath_selected_student') || 'null');
        if (saved && saved.name) {
          const found = students.findIndex(s => s.name === saved.name);
          if (found >= 0) initIdx = found;
        }
      } catch(e){}
      renderStudentBar(initIdx);
      selected = students[initIdx];
      loadPdfs();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch (e) {
      document.getElementById('loading').textContent = '오류: ' + e.message;
    }
  }

  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function renderStudentBar(idx) {
    const s = students[idx];
    const role = s.role === 'student' ? '학생' : '학부모';
    document.getElementById('studentInfo').innerHTML =
      esc(s.name) + ' 학생' + (s.school ? ' <span class="meta">' + esc(s.school) + (s.grade ? ' · ' + esc(s.grade) : '') + (s.className ? ' / ' + esc(s.className) : '') + '</span>' : '');
    const sel = document.getElementById('childSelect');
    if (students.length > 1) {
      sel.innerHTML = students.map((st, i) => '<option value="' + i + '"' + (i === idx ? ' selected' : '') + '>' + esc(st.name) + (st.className ? ' (' + esc(st.className) + ')' : '') + '</option>').join('');
      sel.style.display = 'inline-block';
    }
  }

  function onChildChange() {
    const idx = parseInt(document.getElementById('childSelect').value, 10) || 0;
    selected = students[idx];
    sessionStorage.setItem('kwmath_selected_student', JSON.stringify(selected));
    renderStudentBar(idx);
    loadPdfs();
  }

  async function loadPdfs() {
    const list = document.getElementById('pdfList');
    list.innerHTML = '<div class="empty-state">불러오는 중...</div>';
    try {
      const folder = 'test-results/' + encodeURIComponent(selected.name);
      const res = await fetch('/api/list-files?folder=' + folder + '&name=' + encodeURIComponent(selected.name), {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const data = await res.json();
      if (!res.ok) {
        list.innerHTML = '<div class="empty-state"><span class="icon">⚠️</span>' + esc(data.error || '불러오기 실패') + '</div>';
        return;
      }
      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = '<div class="empty-state"><span class="icon">📭</span>아직 등록된 <b>학습 진단 보고서</b>가 없어요.<br><small>원클릭 보고서·모의고사 결과가 올라오면 여기에 자동 표시됩니다.</small></div>';
        return;
      }
      // 날짜 최신순 정렬
      data.sort((a, b) => new Date(b.lastModified) - new Date(a.lastModified));
      list.innerHTML = data.map(f => {
        const date = f.lastModified ? new Date(f.lastModified).toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit' }) : '';
        const dlUrl = '/api/download-file?key=' + encodeURIComponent(f.key) + '&name=' + encodeURIComponent(selected.name);
        return '<div class="pdf-item"><div class="pdf-info"><div class="pdf-name">' + esc(f.displayName) + '</div><div class="pdf-meta">' + date + ' · ' + esc(f.sizeLabel) + '</div></div><a class="pdf-dl-btn" href="' + dlUrl + '" target="_blank" rel="noopener noreferrer">📥 보기</a></div>';
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="empty-state"><span class="icon">⚠️</span>' + esc(e.message) + '</div>';
    }
  }

  loadMe();

  // ─── 공부량 카드 ───
  async function loadStudyCard() {
    try {
      const res = await fetch('/api/study', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (!res.ok || !data.ok) return;
      const card = document.getElementById('studyCard');
      if (!card) return;
      // 이번 달 누계 + 평균
      const monthMin = Number(data.month) || 0;
      const today = new Date();
      const daysIn = today.getDate();
      const avgMin = daysIn > 0 ? Math.round(monthMin / daysIn) : 0;
      const fmt = (m) => {
        m = Math.round(m || 0);
        if (m < 60) return m + '분';
        const h = Math.floor(m / 60), mm = m % 60;
        return h + '시간' + (mm ? ' ' + mm + '분' : '');
      };
      document.getElementById('scAvg').textContent = fmt(avgMin);
      document.getElementById('scTotal').textContent = fmt(monthMin);

      // 미니 차트 (최근 14일)
      const byDate = data.byDate || {};
      const ymd = (d) => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      const arr = [];
      const t0 = new Date(); t0.setHours(0,0,0,0);
      for (let i = 13; i >= 0; i--) {
        const d = new Date(t0); d.setDate(t0.getDate() - i);
        arr.push({ d: d, min: byDate[ymd(d)] || 0 });
      }
      const max = Math.max(60, ...arr.map(x => x.min));
      const W = 600, H = 60;
      const padL = 4, padR = 4, padB = 14, padT = 4;
      const chartW = W - padL - padR;
      const chartH = H - padT - padB;
      const step = chartW / arr.length;
      const barW = step * 0.7;
      let svg = '';
      arr.forEach((x, i) => {
        const h = (x.min / max) * chartH;
        const bx = padL + i * step + (step - barW) / 2;
        const by = padT + chartH - h;
        const cls = x.min > 0 ? 'mini-bar' : 'mini-bar empty';
        svg += '<rect class="' + cls + '" x="' + bx + '" y="' + by + '" width="' + barW + '" height="' + Math.max(h, 1) + '" rx="2"/>';
        if (i === 0 || i === arr.length - 1) {
          const label = (x.d.getMonth()+1) + '/' + x.d.getDate();
          svg += '<text class="mini-axis" x="' + (bx + barW/2) + '" y="' + (H-2) + '" text-anchor="middle">' + label + '</text>';
        }
      });
      document.getElementById('miniChart').innerHTML = svg;
      if (monthMin > 0 || arr.some(x => x.min > 0)) card.style.display = 'block';
    } catch (e) { /* 조용히 실패 */ }
  }

  // ─── 오답 재도전(쌍둥이) 헬퍼 ───
  //   MathLive는 수식 문항 재입력에만 필요. 로드 실패하면 텍스트 입력으로 폴백(신뢰성).
  let _mathLiveReady = false, _mathLivePromise = null;
  function ensureMathLive() {
    if (_mathLiveReady) return Promise.resolve(true);
    if (_mathLivePromise) return _mathLivePromise;
    _mathLivePromise = import('https://cdn.jsdelivr.net/npm/mathlive/+esm')
      .then(() => { _mathLiveReady = true; return true; })
      .catch(() => false);
    return _mathLivePromise;
  }
  // 수식 입력 위젯 — math-field(로드되면) 또는 텍스트 폴백. {el, getValue} 반환.
  function makeMathInput(initial) {
    const wrap = document.createElement('span');
    wrap.style.display = 'block';
    const mf = document.createElement('math-field');
    mf.setAttribute('math-virtual-keyboard-policy', 'onfocus');
    mf.className = 'twin-mf';
    wrap.appendChild(mf);
    let fellBack = false, textEl = null;
    function fallback() {
      if (fellBack) return;
      fellBack = true;
      textEl = document.createElement('input');
      textEl.type = 'text'; textEl.className = 'twin-text';
      textEl.placeholder = '답 입력 (예: 1/2)';
      textEl.value = initial || '';
      wrap.innerHTML = ''; wrap.appendChild(textEl);
    }
    ensureMathLive().then((ok) => {
      if (!ok) { fallback(); return; }
      customElements.whenDefined('math-field').then(() => { try { mf.value = initial || ''; } catch (_) {} });
    });
    setTimeout(() => { if (!_mathLiveReady && !fellBack) fallback(); }, 2500);
    return {
      el: wrap,
      getValue: () => fellBack ? (textEl ? textEl.value : '') : (function () { try { return mf.value || ''; } catch (_) { return ''; } })()
    };
  }
  function setTwinBadge(badge, twin) {
    if (!twin || !twin.status || twin.status === 'todo') { badge.textContent = ''; badge.className = 'twin-badge'; return; }
    if (twin.status === 'o') { badge.textContent = '✔ 정답'; badge.className = 'twin-badge o'; }
    else { badge.textContent = '✕ 오답'; badge.className = 'twin-badge x'; }
  }
  // 재도전 폼을 컨테이너에 생성(오답+쌍둥이정답 有 문항만 입력칸 노출).
  function buildTwinForm(box, r) {
    box.innerHTML = '';
    const intro = document.createElement('div');
    intro.className = 'twin-intro';
    intro.textContent = '틀린 문제의 쌍둥이(클리닉 학습지)를 풀고, 아래에 답을 입력한 뒤 제출하세요. 이 점수는 시험 성적과 별개로 기록돼요.';
    box.appendChild(intro);
    const fields = [];
    (r.questions || []).forEach((q, n) => {
      if (!(q.twin && q.twin.has)) return;
      const row = document.createElement('div'); row.className = 'twin-q';
      const ql = document.createElement('div'); ql.className = 'twin-ql';
      ql.textContent = (n + 1) + '. ' + (q.label || '');
      const badge = document.createElement('span');
      setTwinBadge(badge, q.twin);
      ql.appendChild(badge);
      row.appendChild(ql);
      let getValue;
      if (q.type === 'math') {
        const mi = makeMathInput(q.twin && q.twin.mine ? q.twin.mine : '');
        row.appendChild(mi.el); getValue = mi.getValue;
      } else {
        const inp = document.createElement('input');
        inp.type = 'text'; inp.className = 'twin-text';
        inp.placeholder = '쌍둥이 문제의 답';
        inp.value = (q.twin && q.twin.mine) ? q.twin.mine : '';
        row.appendChild(inp); getValue = () => inp.value || '';
      }
      const corr = document.createElement('div'); corr.className = 'twin-correct';
      if (q.twin && q.twin.status === 'x' && q.twin.answer) corr.textContent = '정답: ' + q.twin.answer;
      row.appendChild(corr);
      fields.push({ qid: q.id, getValue, badge, corr });
      box.appendChild(row);
    });
    const sb = document.createElement('button');
    sb.type = 'button'; sb.className = 'twin-submit';
    sb.textContent = (r.twin && r.twin.attempted) ? '다시 제출' : '제출하기';
    sb.addEventListener('click', () => submitTwin(r, fields, sb));
    box.appendChild(sb);
  }
  function updateTwinHeader(r) {
    const sp = document.getElementById('twinScore' + r.responseId);
    if (sp) sp.textContent = '재도전 ' + (r.twin.score || 0) + '/' + (r.twin.maxScore || r.twin.eligible || 0);
  }
  async function submitTwin(r, fields, sb) {
    const answers = {};
    fields.forEach((f) => { answers[f.qid] = f.getValue(); });
    sb.disabled = true; sb.textContent = '제출 중...';
    try {
      const res = await fetch('/api/surveys?id=' + encodeURIComponent(r.surveyId) + '&respond=1&twin=1', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ answers })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) { showToast(data && data.error ? data.error : '제출 실패'); sb.disabled = false; sb.textContent = '제출하기'; return; }
      const detail = data.detail || {};
      fields.forEach((f) => {
        const d = detail[f.qid];
        const tw = { has: true };
        if (!d || d.pending) tw.status = 'todo';
        else if (d.correct) tw.status = 'o';
        else { tw.status = 'x'; if (d.answer) tw.answer = d.answer; }
        setTwinBadge(f.badge, tw);
        f.corr.textContent = (tw.status === 'x' && tw.answer) ? ('정답: ' + tw.answer) : '';
        const q = (r.questions || []).find((x) => x.id === f.qid);
        if (q) q.twin = Object.assign({}, q.twin, { mine: answers[f.qid], status: tw.status, answer: tw.answer });
      });
      r.twin = Object.assign({}, r.twin, { attempted: true, score: data.score, maxScore: data.maxScore });
      updateTwinHeader(r);
      showToast('재도전 결과: ' + data.score + '/' + data.maxScore + ' 맞았어요');
      sb.disabled = false; sb.textContent = '다시 제출';
    } catch (e) {
      showToast('오류: ' + e.message); sb.disabled = false; sb.textContent = '제출하기';
    }
  }

  // ─── 테스트 결과 다시보기 (학생 본인 + 학부모 계정의 자녀 이름 매칭) ───
  //   /api/surveys?results=1 — 서버가 이 계정 휴대폰 응답 + 연결된 자녀 이름 응답을 합쳐 반환.
  //   자녀가 여럿이면 선택된 자녀 이름으로만 걸러 보여준다.
  let _quizAll = null;   // 서버 응답 캐시(자녀 전환 시 재조회 없이 재렌더)
  async function loadQuizzes() {
    const sec = document.getElementById('quizSection');
    const list = document.getElementById('quizList');
    if (!sec || !list) return;
    try {
      if (!_quizAll) {
        const res = await fetch('/api/surveys?results=1', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (!res.ok || !data.ok) return;   // 조용히 실패(테스트 섹션만 숨김)
        _quizAll = Array.isArray(data.results) ? data.results : [];
      }
      const rows = (students.length > 1 && selected)
        ? _quizAll.filter(r => !r.respondentName || r.respondentName === selected.name)
        : _quizAll;
      if (!rows.length) { sec.style.display = 'none'; return; }
      list.innerHTML = rows.map((r, i) => {
        const d = r.createdAt ? new Date(r.createdAt) : null;
        const dateTxt = (d && !isNaN(d)) ? (d.getMonth() + 1) + '월 ' + d.getDate() + '일' : '';
        const pend = r.essay && r.essay.pending > 0;
        const head =
          '<div class="quiz-head" data-qi="' + i + '">' +
            '<div class="t">' + esc(dateTxt) + ' <small>' + esc(r.title || '테스트') + '</small></div>' +
            '<div class="s">' + r.score + '점' + (pend ? '<span class="quiz-pend">채점 전</span>' : '') + '</div>' +
            '<div class="arrow">▶</div>' +
          '</div>';
        const split =
          '<div class="quiz-split">단답형 ' + r.auto.score + '/' + r.auto.max + '점 · 서술형 ' +
          r.essay.score + '/' + r.essay.max + '점</div>' +
          (pend ? '<div class="quiz-note">✍️ 서술형 ' + r.essay.pending + '문항은 선생님이 채점하면 점수에 더해져요</div>' : '');
        const qs = (r.questions || []).map((q, n) => {
          let badge = '';
          if (q.status === 'o') badge = '<span class="qr-badge o">✔ 맞았어요' + (Number.isFinite(q.points) ? ' +' + q.points + '점' : '') + '</span>';
          else if (q.status === 'x') badge = '<span class="qr-badge x">✕ 틀렸어요</span>';
          else if (q.status === 'pending') badge = '<span class="qr-badge p">⏳ 채점 대기 (' + q.points + '점)</span>';
          return '<div class="qr-q">' +
            '<div class="ql">' + (n + 1) + '. ' + esc(q.label) + badge + '</div>' +
            '<div class="qr-ans">내 답: <b>' + (q.mine ? esc(q.mine) : '(무응답)') + '</b></div>' +
            (q.status === 'x' && q.answer ? '<div class="qr-correct">정답: ' + esc(q.answer) + '</div>' : '') +
          '</div>';
        }).join('');
        let twinHtml = '';
        if (r.twin && r.twin.eligible > 0) {
          const done = r.twin.attempted;
          twinHtml =
            '<div class="twin-wrap">' +
              '<button type="button" class="twin-btn" data-twin="' + r.responseId + '">🔁 오답 재도전</button>' +
              '<span class="twin-score" id="twinScore' + r.responseId + '">' +
                (done ? ('재도전 ' + (r.twin.score || 0) + '/' + (r.twin.maxScore || r.twin.eligible)) : '') +
              '</span>' +
              '<div class="twin-box" id="twinBox' + r.responseId + '" style="display:none;"></div>' +
            '</div>';
        }
        return '<div class="quiz-item">' + head + '<div class="quiz-body">' + split + qs + twinHtml + '</div></div>';
      }).join('');
      list.querySelectorAll('.quiz-head').forEach(h => {
        h.addEventListener('click', () => h.parentElement.classList.toggle('open'));
      });
      list.querySelectorAll('.twin-btn').forEach(btn => {
        btn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          const rid = btn.getAttribute('data-twin');
          const box = document.getElementById('twinBox' + rid);
          const r = rows.find(x => String(x.responseId) === String(rid));
          if (!box || !r) return;
          if (box.style.display === 'none') {
            if (!box._built) { buildTwinForm(box, r); box._built = true; }
            box.style.display = 'block';
          } else { box.style.display = 'none'; }
        });
      });
      sec.style.display = 'block';
    } catch (e) { /* 조용히 실패 */ }
  }

  // 학생 선택되고 PDF 로드된 후에 공부량·테스트 결과도 조회
  const _origLoadPdfs = loadPdfs;
  loadPdfs = async function() {
    await _origLoadPdfs();
    loadStudyCard();
    loadQuizzes();
  };

  // SW 등록
  ('serviceWorker' in navigator) && navigator.serviceWorker.register('/sw.js').catch(function(e){console.error('SW register fail:', e);});
</script>
</body>
</html>
