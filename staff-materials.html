<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>수업자료 확인 · 이관우 수학연구소</title>
<style>
  :root{ --primary:#862633; --primary-light:#F9ECED; --ink:#1E1E1E; --muted:#777; --border:#EDE0E1; --bg:#FAF7F7; --ok:#1F7A33; --ok-light:#E5F5E8; --warn:#B07A00; --warn-light:#FFF7E0; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--ink); }
  .wrap{ max-width:780px; margin:0 auto; padding:max(18px,env(safe-area-inset-top,18px)) 16px 60px; }
  .top{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:4px; }
  h1{ font-size:1.3rem; margin:6px 0 2px; }
  .sub{ color:var(--muted); font-size:0.82rem; margin-bottom:14px; }
  .back{ color:var(--primary); text-decoration:none; font-size:0.84rem; font-weight:700; background:none; border:none; cursor:pointer; font-family:inherit; }
  .nav{ display:flex; gap:8px; margin-bottom:13px; flex-wrap:wrap; }
  .nav a{ flex:1; min-width:110px; text-align:center; text-decoration:none; background:#fff; border:1.5px solid var(--border); border-radius:10px; padding:9px 10px; font-weight:700; font-size:0.82rem; color:var(--ink); }
  .nav a.cur{ border-color:var(--primary); background:var(--primary-light); color:var(--primary); }
  .bar{ display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .search{ flex:1; min-width:140px; padding:8px 12px; border:1.5px solid var(--border); border-radius:9px; font-size:0.9rem; font-family:inherit; outline:none; }
  .search:focus{ border-color:var(--primary); }
  .sechead{ font-weight:800; font-size:1.02rem; margin:18px 2px 6px; display:flex; align-items:center; gap:8px; }
  .sechead .cnt{ font-size:0.74rem; font-weight:700; color:var(--muted); }
  .sechint{ font-size:0.76rem; color:var(--muted); margin:0 2px 10px; }
  .clshead{ font-weight:800; font-size:0.93rem; margin:14px 2px 7px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .clshead .cnt{ font-size:0.74rem; font-weight:700; color:var(--muted); }
  .card{ background:#fff; border:1px solid var(--border); border-radius:13px; padding:6px 15px; margin-bottom:8px; }
  .file{ display:flex; align-items:center; gap:9px; font-size:0.86rem; padding:9px 2px; border-bottom:1px solid var(--border); }
  .file:last-child{ border-bottom:none; }
  .file .fic{ font-size:1rem; }
  .file a{ color:var(--primary); font-weight:700; text-decoration:none; cursor:pointer; word-break:break-all; }
  .file a:hover{ text-decoration:underline; }
  .file .fm{ color:var(--muted); font-size:0.74rem; margin-left:auto; white-space:nowrap; }
  .file .fdate{ display:inline-block; font-size:0.72rem; font-weight:700; padding:2px 8px; border-radius:8px; background:var(--primary-light); color:var(--primary); white-space:nowrap; }
  .msg{ background:#fff; border:1px solid var(--border); border-radius:12px; padding:26px 18px; text-align:center; color:var(--muted); font-size:0.86rem; }
  .toast{ position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(30,30,30,0.92); color:#fff; padding:11px 18px; border-radius:9px; font-size:0.84rem; font-weight:600; z-index:100; display:none; }
  .toast.show{ display:block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>📚 수업자료 확인</h1><div class="sub">원장님이 올린 수업자료를 반별로 확인하고 내려받아요 · 담당 학원 반만 보여요</div></div>
    <button class="back" onclick="logout()">로그아웃</button>
  </div>
  <div class="nav">
    <a href="/admin-qna">💬 질문 답변</a>
    <a href="/staff-students">🎓 학생</a>
    <a href="/staff-scores">📈 성적</a>
    <a href="/staff-reports">📋 리포트</a>
    <a href="/staff-materials" class="cur">📚 수업자료</a>
    <a href="/admin-surveys">📝 테스트</a>
    <a href="/staff-worklog">🗓️ 근무기록</a>
  </div>
  <div class="bar">
    <input class="search" id="search" placeholder="반·파일명·날짜 검색" oninput="render()">
  </div>
  <div id="content"><div class="msg">불러오는 중…</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
  var token = sessionStorage.getItem('kwmath_admin_pw') || localStorage.getItem('kwmath_admin_pw') || localStorage.getItem('kwmath_admin_token') || null;
  if (!token) location.href = '/portal';
  var data = { class: [], shared: [] };
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function q1(s){ return String(s==null?'':s).replace(/'/g,'&#39;'); }
  function showToast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2400); }
  function logout(){ sessionStorage.removeItem('kwmath_admin_pw'); localStorage.removeItem('kwmath_admin_pw'); location.href='/portal'; }

  async function api(path, opts){
    opts = opts || {}; opts.headers = opts.headers || {};
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    opts.credentials = 'same-origin';
    var r = await fetch(path, opts);
    if (r.status === 401){ logout(); throw new Error('401'); }
    return r;
  }

  async function loadAll(){
    try {
      var r = await api('/api/staff-materials');
      var d = await r.json();
      if (!r.ok) throw new Error((d && d.error) || '불러오기 실패');
      data.class = Array.isArray(d.class) ? d.class : [];
      data.shared = Array.isArray(d.shared) ? d.shared : [];
      render();
    } catch(e) {
      $('content').innerHTML = '<div class="msg">불러오지 못했어요: '+esc(e.message)+'</div>';
    }
  }

  function match(f, q){
    if (!q) return true;
    return (f.className||'').indexOf(q)>=0 || (f.name||'').indexOf(q)>=0 || (f.date||'').indexOf(q)>=0 || (f.academy||'').indexOf(q)>=0;
  }

  function fileRow(f, icon){
    var right = (f.date ? '<span class="fdate">'+esc(f.date)+'</span>' : '') +
                '<span class="fm">'+esc(f.sizeLabel||'')+'</span>';
    return '<div class="file"><span class="fic">'+icon+'</span>' +
           '<a onclick="openFile(\''+q1(f.key)+'\')">'+esc(f.name)+'</a>' + right + '</div>';
  }

  function render(){
    var q = ($('search').value||'').trim();
    var html = '';

    // ── 수업자료(반별) ──
    var cls = data.class.filter(function(f){ return match(f, q); });
    html += '<div class="sechead">📚 수업자료 <span class="cnt">'+cls.length+'개</span></div>';
    if (!data.class.length){
      html += '<div class="msg">아직 올라온 수업자료가 없어요.<br>담당 학원이 배정되면 그 반의 자료가 여기 보여요.</div>';
    } else if (!cls.length){
      html += '<div class="msg">검색 결과가 없어요.</div>';
    } else {
      var groups = {}, order = [];
      cls.forEach(function(f){
        var label = f.academy ? (f.academy + ' · ' + (f.className||'반 미지정')) : (f.className||'반 미지정');
        if (!groups[label]){ groups[label] = []; order.push(label); }
        groups[label].push(f);
      });
      order.forEach(function(label){
        var arr = groups[label];
        html += '<div class="clshead">'+esc(label)+' <span class="cnt">'+arr.length+'개</span></div>';
        html += '<div class="card">' + arr.map(function(f){ return fileRow(f, '📄'); }).join('') + '</div>';
      });
    }

    // ── 원장님 전달 자료(모든 조교 공용) ──
    var shd = data.shared.filter(function(f){ return match(f, q); });
    html += '<div class="sechead">🧑‍🏫 원장님 전달 자료 <span class="cnt">'+shd.length+'개</span></div>';
    html += '<div class="sechint">원장님이 조교 선생님들께 직접 전달한 자료예요 (모든 조교 공용).</div>';
    if (!data.shared.length){
      html += '<div class="msg">원장님이 전달한 자료가 없어요.</div>';
    } else if (!shd.length){
      html += '<div class="msg">검색 결과가 없어요.</div>';
    } else {
      html += '<div class="card">' + shd.map(function(f){ return fileRow(f, '📎'); }).join('') + '</div>';
    }

    $('content').innerHTML = html;
  }

  async function openFile(key){
    try {
      showToast('파일 여는 중…');
      var r = await api('/api/staff-materials?key=' + encodeURIComponent(key));
      if (!r.ok) { showToast('파일을 열 수 없어요'); return; }
      var blob = await r.blob();
      window.open(URL.createObjectURL(blob), '_blank');
    } catch(e) { showToast('파일을 열 수 없어요'); }
  }

  loadAll();
</script>
</body>
</html>
