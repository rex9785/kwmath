<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>수업 영상 | 이관우 수학연구소</title>
<link rel="manifest" href="/manifest.json?v=2">
<meta name="theme-color" content="#8B1A35">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=6">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--primary:#8B1A35;--primary-light:#F9EEF1;--primary-mid:#B02347;--text:#1E1E1E;--text-light:#666;--bg:#FFF;--bg2:#FAF7F8;--border:#EDE0E3;}
  body{font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg2);min-height:100vh;word-break:keep-all;overflow-wrap:break-word;line-break:strict;}

  .topbar{background:var(--primary);color:#fff;padding:max(14px,env(safe-area-inset-top,14px)) 20px 14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .topbar-title{font-size:0.95rem;font-weight:900;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px;color:#fff;text-decoration:none;}
  .topbar-title .logo-mark{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#fff;border-radius:6px;overflow:hidden;padding:0;}
  .topbar-title .logo-mark img{width:100%;height:100%;object-fit:cover;display:block;}
  .topbar-btn{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);color:#fff;padding:6px 12px;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;}
  .topbar-btn:hover{background:rgba(255,255,255,0.26);}

  .page{max-width:640px;margin:0 auto;padding:24px 18px 80px;}

  .student-bar{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
  .student-bar .info{font-size:0.92rem;font-weight:700;color:var(--text);}
  .student-bar .info .meta{display:block;font-size:0.75rem;font-weight:500;color:var(--text-light);margin-top:2px;}
  .student-bar select{padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.85rem;font-family:inherit;background:#fff;outline:none;}

  .video-card{background:#fff;border-radius:14px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:0 2px 10px rgba(139,26,53,0.05);}
  .video-card-header{background:var(--primary);color:#fff;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;}
  .video-card-date{font-size:0.88rem;font-weight:700;}
  .video-card-class{font-size:0.74rem;opacity:0.85;}
  .video-card-body{padding:18px;}
  .video-title{font-size:0.88rem;font-weight:600;color:var(--text);margin-bottom:14px;line-height:1.5;}

  .watch-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:var(--primary);color:#fff;text-decoration:none;border-radius:11px;padding:14px;font-size:0.95rem;font-weight:900;transition:background .15s;border:none;cursor:pointer;font-family:inherit;}
  .watch-btn:hover{background:var(--primary-mid);}
  .watch-btn.locked{background:#666;}
  .watch-btn.locked:hover{background:#444;}
  .play-circle{width:30px;height:30px;background:rgba(255,255,255,0.22);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .play-circle svg{fill:#fff;margin-left:2px;}
  .access-note{font-size:0.74rem;color:var(--text-light);text-align:center;margin-top:10px;line-height:1.7;}
  .latest-badge{background:rgba(255,255,255,0.25);font-size:0.7rem;padding:2px 8px;border-radius:10px;margin-left:6px;}

  .state-box{text-align:center;padding:48px 24px;color:var(--text-light);}
  .state-box .state-icon{font-size:2.4rem;margin-bottom:12px;}
  .state-box p{font-size:0.9rem;line-height:1.8;}
  @media(max-width:480px){.student-bar{flex-direction:column;align-items:flex-start;}.student-bar select{width:100%;}}
</style>
</head>
<body>

<div class="topbar">
  <a href="/portal" class="topbar-title">
    <span class="logo-mark"><img src="/icons/icon-192.png?v=6" alt="이관우 수학연구소"></span>
    <span>🎥 수업 영상</span>
  </a>
  <a href="/portal" class="topbar-btn">← 포털</a>
</div>

<div class="page">
  <div class="student-bar">
    <div class="info">
      <span id="studentName">학생 정보 불러오는 중...</span>
      <span class="meta" id="studentMeta"></span>
    </div>
    <select id="childSelect" onchange="onChildChange()" style="display:none;"></select>
  </div>

  <div id="videoList">
    <div class="state-box"><div class="state-icon">⏳</div><p>영상 불러오는 중...</p></div>
  </div>
</div>

<script>
  const TOKEN_KEY = 'kwmath_portal_token';
  const SEL_KEY   = 'kwmath_selected_student';
  let currentToken = '';
  let currentStudents = [];
  let selectedStudent = null;

  function $(id){ return document.getElementById(id); }
  function escapeHtml(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function authHeaders(){ return { 'Authorization': 'Bearer ' + currentToken }; }
  function redirectToPortal(){ window.location.replace('/portal'); }

  function renderStudentBar(){
    if (!selectedStudent){ $('studentName').textContent='학생 정보 없음'; return; }
    $('studentName').textContent = selectedStudent.name + ' 학생';
    const parts = [selectedStudent.school, selectedStudent.grade, selectedStudent.academy, selectedStudent.className].filter(Boolean);
    $('studentMeta').textContent = parts.join(' · ');
    const sel = $('childSelect');
    if (currentStudents.length > 1) {
      sel.style.display = 'inline-block';
      sel.innerHTML = currentStudents.map((s, i) =>
        `<option value="${i}" ${s.name===selectedStudent.name?'selected':''}>${escapeHtml(s.name)}</option>`
      ).join('');
    } else { sel.style.display = 'none'; }
  }

  function onChildChange(){
    const idx = parseInt($('childSelect').value, 10) || 0;
    selectedStudent = currentStudents[idx];
    sessionStorage.setItem(SEL_KEY, JSON.stringify(selectedStudent));
    renderStudentBar();
    loadVideos();
  }

  async function init(){
    currentToken = localStorage.getItem(TOKEN_KEY);
    if (!currentToken) return redirectToPortal();
    try {
      const res = await fetch('/api/auth/me', { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok || !data.ok) { localStorage.removeItem(TOKEN_KEY); return redirectToPortal(); }
      currentStudents = Array.isArray(data.students) ? data.students : [];
      if (!currentStudents.length) {
        $('videoList').innerHTML = '<div class="state-box"><div class="state-icon">⚠️</div><p>이 휴대폰에 연결된 학생이 없습니다.<br>관우T께 문의해주세요.</p></div>';
        return;
      }
      const saved = sessionStorage.getItem(SEL_KEY);
      if (saved) {
        try {
          const sel = JSON.parse(saved);
          selectedStudent = currentStudents.find(s => s.name === sel.name) || currentStudents[0];
        } catch (_) { selectedStudent = currentStudents[0]; }
      } else { selectedStudent = currentStudents[0]; }
      sessionStorage.setItem(SEL_KEY, JSON.stringify(selectedStudent));
      renderStudentBar();
      loadVideos();
    } catch (e) {
      $('videoList').innerHTML = '<div class="state-box"><div class="state-icon">⚠️</div><p>로그인 정보를 확인할 수 없습니다.</p></div>';
    }
  }

  async function loadVideos(){
    if (!selectedStudent) return;
    $('videoList').innerHTML = '<div class="state-box"><div class="state-icon">🔍</div><p>영상을 불러오는 중입니다...</p></div>';
    try {
      const res = await fetch('/api/class-videos?name=' + encodeURIComponent(selectedStudent.name), { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        $('videoList').innerHTML = '<div class="state-box"><div class="state-icon">📭</div><p>' + escapeHtml(data.error || '영상을 불러올 수 없습니다.') + '</p></div>';
        return;
      }
      if (!data.videos || !data.videos.length) {
        $('videoList').innerHTML = '<div class="state-box"><div class="state-icon">📭</div><p>등록된 수업 영상이 없습니다.</p></div>';
        return;
      }
      $('videoList').innerHTML = data.videos.map((v, i) => {
        const dateStr = v.date ? v.date.replace(/-/g, '.') : '';
        const latestBadge = i === 0 ? '<span class="latest-badge">최신</span>' : '';
        const playButton = v.locked
          ? `<button class="watch-btn locked" onclick="unlockVideo('${escapeHtml(v.code)}', '${escapeHtml(selectedStudent.name)}')">
               <div class="play-circle">🔒</div>
               수업코드 입력 후 시청 →
             </button>`
          : `<a href="${escapeHtml(v.youtube_url)}" target="_blank" class="watch-btn" onclick="logView('${escapeHtml(v.code)}', '${escapeHtml(selectedStudent.name)}')">
               <div class="play-circle"><svg width="13" height="13" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
               수업 영상 시청하기 →
             </a>`;
        const note = v.locked
          ? '<div class="access-note">🔒 이 영상은 선생님이 알려준 수업코드가 필요합니다.</div>'
          : '<div class="access-note">영상 시청 기록이 선생님께 전달됩니다.</div>';
        return `<div class="video-card">
          <div class="video-card-header">
            <div class="video-card-date">${escapeHtml(dateStr)} 수업${latestBadge}</div>
            <div class="video-card-class">${escapeHtml(v.school || '')} ${escapeHtml(v.class_name || '')}</div>
          </div>
          <div class="video-card-body">
            <div class="video-title">${escapeHtml(v.title || '수업 영상')}</div>
            ${playButton}
            ${note}
          </div>
        </div>`;
      }).join('');
    } catch (e) {
      $('videoList').innerHTML = '<div class="state-box"><div class="state-icon">⚠️</div><p>불러오지 못했습니다.</p></div>';
    }
  }

  async function logView(code, name){
    if (!code) return;
    try {
      await fetch('/api/video-access', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code, name }) });
    } catch (_) {}
  }

  async function unlockVideo(expectedCode, studentName){
    const input = prompt('선생님께 받은 수업코드를 입력해주세요\n(예: S2-0520-A7)');
    if (!input) return;
    const code = input.trim().toUpperCase();
    if (code !== (expectedCode || '').toUpperCase()) { alert('수업코드가 일치하지 않습니다.'); return; }
    try {
      const res = await fetch('/api/video-access?code=' + encodeURIComponent(code));
      const data = await res.json();
      if (!res.ok || !data.youtube_url) { alert('영상을 불러오지 못했습니다: ' + (data.error || res.status)); return; }
      fetch('/api/video-access', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ code, name: studentName }) }).catch(() => {});
      window.open(data.youtube_url, '_blank');
    } catch (e) { alert('오류: ' + e.message); }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
