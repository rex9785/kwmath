<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>퇴원생 기록 · 이관우 수학연구소</title>
<style>
  :root{ --primary:#862633; --primary-light:#F9ECED; --ink:#1E1E1E; --muted:#777; --border:#EDE0E1; --bg:#FAF7F7; --mock:#1f6f78; --mock-light:#E3F1F2; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--ink); }
  .wrap{ max-width:1040px; margin:0 auto; padding:max(18px,env(safe-area-inset-top,18px)) 16px 60px; }
  .top{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:4px; }
  h1{ font-size:1.3rem; margin:6px 0 2px; }
  .sub{ color:var(--muted); font-size:0.82rem; margin-bottom:14px; }
  a.back{ color:var(--primary); text-decoration:none; font-size:0.84rem; font-weight:700; }
  .bar{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
  .count{ font-weight:800; font-size:1.0rem; }
  .count b{ color:var(--primary); }
  .search{ position:relative; }
  .search input{ width:240px; max-width:60vw; padding:9px 32px 9px 12px; border:1px solid var(--border); border-radius:9px; font-size:0.9rem; font-family:inherit; outline:none; background:#fff; }
  .search input:focus{ border-color:var(--primary); }
  .search .ic{ position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.9rem; }
  .card{ background:#fff; border:1px solid var(--border); border-radius:14px; padding:0; overflow:hidden; }
  table{ width:100%; border-collapse:collapse; font-size:0.9rem; }
  th{ background:var(--primary-light); color:var(--primary); text-align:left; padding:11px 12px; font-weight:700; font-size:0.82rem; white-space:nowrap; }
  td{ border-bottom:1px solid var(--border); padding:11px 12px; vertical-align:middle; }
  tr.main:hover{ background:#FCFAFA; }
  .badge{ display:inline-block; border-radius:6px; padding:2px 8px; font-size:0.74rem; font-weight:700; }
  .badge.out{ background:#F1E4E6; color:var(--primary); }
  .badge.self{ background:#EEE; color:#777; }
  .gr{ font-weight:700; }
  .nm{ font-weight:700; }
  .ph{ font-weight:400; color:var(--muted); font-size:0.76rem; margin-top:3px; line-height:1.4; }
  .sum{ color:#444; }
  .sum .up{ color:#1f8a4c; font-weight:700; }
  .chips span{ display:inline-block; background:#F4F0F1; color:#555; border-radius:6px; padding:1px 7px; font-size:0.74rem; margin-right:4px; }
  .muted{ color:var(--muted); }
  button.mini{ background:#fff; color:var(--primary); border:1px solid var(--primary); border-radius:7px; padding:5px 11px; font-size:0.78rem; font-weight:700; cursor:pointer; font-family:inherit; }
  button.mini:hover{ background:var(--primary-light); }
  .detail{ background:#FBF8F8; }
  .detail td{ padding:0; border-bottom:1px solid var(--border); }
  .detail-inner{ padding:14px 16px; }
  .grp{ margin-bottom:14px; }
  .grp:last-child{ margin-bottom:0; }
  .grp h4{ margin:0 0 6px; font-size:0.88rem; display:flex; align-items:center; gap:6px; }
  .grp h4 .cnt{ font-weight:400; color:var(--muted); font-size:0.78rem; }
  .grp h4.s-score{ color:var(--primary); }
  .grp h4.s-att{ color:#b5651d; }
  .grp h4.s-study{ color:var(--mock); }
  .stbl{ width:100%; border-collapse:collapse; font-size:0.83rem; }
  .stbl th{ background:#fff; border-bottom:1px solid var(--border); color:var(--muted); padding:5px 8px; font-size:0.73rem; text-align:left; }
  .stbl td{ border-bottom:1px dashed var(--border); padding:5px 8px; }
  .pill{ font-weight:800; }
  .sub2{ color:var(--primary); font-weight:700; font-size:0.8rem; margin:8px 0 4px; }
  .emptyrec{ color:var(--muted); font-size:0.82rem; }
  .msg{ background:#fff; border:1px solid var(--border); border-radius:12px; padding:30px 18px; text-align:center; color:var(--muted); }
  .login{ background:#fff; border:1px solid var(--border); border-radius:14px; padding:24px; max-width:340px; margin:50px auto; text-align:center; }
  .login input{ width:100%; margin:12px 0; padding:9px 10px; border:1px solid var(--border); border-radius:9px; font-size:0.95rem; font-family:inherit; }
  .login button{ background:var(--primary); color:#fff; border:none; border-radius:9px; padding:10px 16px; font-weight:700; cursor:pointer; font-family:inherit; }
  .err{ color:#c0392b; font-size:0.8rem; margin-bottom:8px; }
  .note{ font-size:0.74rem; color:var(--muted); margin-top:14px; line-height:1.5; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>📤 퇴원생 기록</h1><div class="sub">퇴원·탈퇴한 학생의 성적·출결·학습 보관 (관리자 전용)</div></div>
    <a class="back" href="/admin">← 관리자</a>
  </div>
  <div id="content"><div class="msg">불러오는 중…</div></div>
  <div class="note" id="footnote" style="display:none;">
    ※ 퇴원·탈퇴한 학생의 <b>이름·전화·성적·출결·학습 전체</b>를 보관합니다(관리자 전용, 앱에는 노출 안 됨).<br>
    ※ <span class="badge out">퇴원</span> 관리자가 퇴원 처리 · <span class="badge self">앱탈퇴</span> 학생이 앱에서 직접 탈퇴(앱에서는 삭제, 기록만 보존).
  </div>
</div>
<script>
  var token = sessionStorage.getItem('kwmath_admin_pw') || localStorage.getItem('kwmath_admin_pw') || localStorage.getItem('kwmath_admin_token') || null;
  var rows = [], openIdx = null, q = '';

  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

  function fmtYM(iso){ if(!iso) return '-'; var d=new Date(iso); if(isNaN(d)) return '-'; return d.getFullYear()+'.'+('0'+(d.getMonth()+1)).slice(-2); }
  function fmtDate(iso){ if(!iso) return ''; var d=new Date(iso); if(isNaN(d)) return esc(iso); return (d.getMonth()+1)+'/'+d.getDate(); }
  function months(a,b){ if(!a||!b) return null; var d1=new Date(a),d2=new Date(b); if(isNaN(d1)||isNaN(d2)) return null; var m=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth()); return m<=0?null:m; }
  function period(o){ var s=fmtYM(o.enrolled_at),e=fmtYM(o.left_at),m=months(o.enrolled_at,o.left_at); return s+' ~ '+e+(m?(' <span class="muted">(약 '+m+'개월)</span>'):''); }
  function hrs(min){ min=Number(min)||0; if(!min) return '0'; var h=Math.floor(min/60),m=min%60; return (h?h+'시간':'')+(m?(' '+m+'분'):'')||'0'; }
  function fmtScore(s){
    if(s.rawScore!=null && s.grade!=null) return s.rawScore+'<span class="muted">('+s.grade+')</span>';
    if(s.rawScore!=null) return ''+s.rawScore;
    if(s.grade!=null) return '('+s.grade+'등급)';
    return '-';
  }
  function jp(str){ try{ var a=JSON.parse(str||'[]'); return Array.isArray(a)?a:[]; }catch(_){ return []; } }

  async function api(path, opts){
    opts = opts || {}; opts.headers = opts.headers || {};
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    opts.credentials = 'same-origin';
    var r = await fetch(path, opts);
    if (r.status === 401){ sessionStorage.removeItem('kwmath_admin_pw'); var had=token; token=null; showLogin(had?'비밀번호가 틀렸습니다':''); throw new Error('401'); }
    return r;
  }
  function showLogin(err){
    $('footnote').style.display='none';
    $('content').innerHTML =
      '<div class="login"><div style="font-weight:700;">관리자 비밀번호</div>'+
      '<input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key===\'Enter\')doLogin()">'+
      (err?'<div class="err">'+esc(err)+'</div>':'')+
      '<button onclick="doLogin()">확인</button></div>';
    var p=$('pw'); if(p) p.focus();
  }
  function doLogin(){ token=($('pw').value||'').trim(); if(!token) return; sessionStorage.setItem('kwmath_admin_pw',token); boot(); }

  async function boot(){
    $('content').innerHTML = '<div class="msg">퇴원생 기록 불러오는 중…</div>';
    try{
      var r = await api('/api/outcomes?t='+Date.now());
      var data = await r.json();
      rows = (data && data.outcomes) || [];
      render();
    }catch(e){ if(String(e.message)!=='401') $('content').innerHTML='<div class="msg">네트워크 오류. 다시 시도해 주세요.</div>'; }
  }

  function filtered(){
    var s=(q||'').trim();
    if(!s) return rows.map(function(o,i){ return {o:o,i:i}; });
    return rows.map(function(o,i){ return {o:o,i:i}; }).filter(function(x){
      return String(x.o.name||'').indexOf(s)>-1 || String(x.o.school||'').indexOf(s)>-1
          || String(x.o.parent_phone||'').indexOf(s)>-1 || String(x.o.student_phone||'').indexOf(s)>-1;
    });
  }

  function render(){
    $('footnote').style.display='block';
    var list = filtered();
    var head =
      '<div class="bar">'+
        '<div class="count">퇴원생 <b>'+list.length+'</b>명'+(q?(' <span class="muted">/ 전체 '+rows.length+'</span>'):'')+'</div>'+
        '<div class="search"><input id="q" type="text" placeholder="이름·학교 검색" value="'+esc(q)+'" oninput="onSearch(this.value)"><span class="ic">🔍</span></div>'+
      '</div>';

    if(!rows.length){ $('content').innerHTML = head + '<div class="msg">아직 퇴원생 기록이 없습니다.<br><span class="muted">학생을 퇴원 처리하면 이 목록에 전체 기록이 자동 보관됩니다.</span></div>'; wireSearch(); return; }

    var body = list.map(function(x){
      var o=x.o, i=x.i;
      var sum = o.summary ? esc(o.summary).replace(/→/g,'<span class="up">→</span>') : '<span class="muted">성적 기록 없음</span>';
      var chips = '<span>성적 '+(o.score_count||0)+'</span>'+
                  '<span>출결 '+(o.attendance_count||0)+'</span><span>공부 '+hrs(o.study_minutes)+'</span>';
      var stBadge = o.via==='app' ? '<span class="badge self">앱탈퇴</span>' : '<span class="badge out">퇴원</span>';
      var phones = [];
      if(o.parent_phone) phones.push('학부모 '+esc(o.parent_phone));
      if(o.student_phone) phones.push('학생 '+esc(o.student_phone));
      var phoneLine = phones.length ? '<div class="ph">'+phones.join('<br>')+'</div>' : '';
      var main =
        '<tr class="main">'+
          '<td class="gr">'+esc(o.grade_level||'-')+'</td>'+
          '<td>'+stBadge+'</td>'+
          '<td class="nm">'+esc(o.name||'-')+phoneLine+'</td>'+
          '<td>'+esc(o.school||'-')+'</td>'+
          '<td class="muted" style="white-space:nowrap;">'+period(o)+'</td>'+
          '<td class="sum">'+sum+'<div class="chips" style="margin-top:4px;">'+chips+'</div></td>'+
          '<td><button class="mini" onclick="toggle('+i+')">'+(openIdx===i?'닫기':'상세보기')+'</button></td>'+
        '</tr>';
      var detail = (openIdx===i) ? ('<tr class="detail"><td colspan="7"><div class="detail-inner">'+ detailHtml(o) +'</div></td></tr>') : '';
      return main + detail;
    }).join('');

    $('content').innerHTML = head +
      '<div class="card"><table>'+
        '<thead><tr><th>학년</th><th>상태</th><th>학생 이름</th><th>학교</th><th>수강기간</th><th>기록 요약</th><th>상세</th></tr></thead>'+
        '<tbody>'+body+'</tbody>'+
      '</table></div>';
    wireSearch();
  }

  function detailHtml(o){
    return scoreSection(o) + attSection(o) + studySection(o);
  }
  function scoreSection(o){
    var scores = jp(o.scores_json);
    var inner;
    if(!scores.length){ inner = '<div class="emptyrec">성적 기록 없음</div>'; }
    else{
      inner = ['내신','모의'].map(function(type){
        var g = scores.filter(function(s){ return s.examType===type; });
        if(!g.length) return '';
        var trs = g.map(function(s){
          return '<tr><td>'+esc(s.gradeLevel||'-')+'</td><td>'+esc(s.label||'-')+'</td><td class="pill">'+fmtScore(s)+'</td><td class="muted">'+esc(s.examDate||'')+'</td></tr>';
        }).join('');
        return '<div class="sub2">'+type+'</div><table class="stbl"><thead><tr><th>학년</th><th>시기</th><th>원점수(등급)</th><th>날짜</th></tr></thead><tbody>'+trs+'</tbody></table>';
      }).join('');
    }
    return '<div class="grp"><h4 class="s-score">📈 성적 <span class="cnt">('+scores.length+'개)</span></h4>'+inner+'</div>';
  }
  function attSection(o){
    var att = jp(o.attendance_json);
    var inner;
    if(!att.length){ inner = '<div class="emptyrec">출결 기록 없음</div>'; }
    else{
      var trs = att.map(function(a){
        var hw = (a.homework===1||a.homework===true)?'완료':((a.homework===0||a.homework===false)?'미완':'');
        return '<tr><td>'+esc(a.date||'')+'</td><td>'+esc(a.status||'')+'</td><td>'+esc(hw)+'</td><td class="muted">'+esc(a.note||'')+'</td><td class="muted">'+esc(a.method||'')+'</td></tr>';
      }).join('');
      inner = '<table class="stbl"><thead><tr><th>날짜</th><th>출결</th><th>숙제</th><th>비고</th><th>방식</th></tr></thead><tbody>'+trs+'</tbody></table>';
    }
    return '<div class="grp"><h4 class="s-att">📅 출결 <span class="cnt">('+att.length+'회)</span></h4>'+inner+'</div>';
  }
  function studySection(o){
    var st = jp(o.study_json);
    var inner;
    if(!st.length){ inner = '<div class="emptyrec">학습 기록 없음</div>'; }
    else{
      var trs = st.map(function(s){
        return '<tr><td>'+esc(s.date||fmtDate(s.startedAt))+'</td><td class="pill">'+hrs(s.minutes)+'</td></tr>';
      }).join('');
      inner = '<div class="muted" style="font-size:0.8rem;margin-bottom:4px;">총 '+st.length+'회 · '+hrs(o.study_minutes)+'</div>'+
              '<table class="stbl"><thead><tr><th>날짜</th><th>공부시간</th></tr></thead><tbody>'+trs+'</tbody></table>';
    }
    return '<div class="grp"><h4 class="s-study">📚 학습 <span class="cnt">('+st.length+'회)</span></h4>'+inner+'</div>';
  }

  function toggle(i){ openIdx = (openIdx===i? null : i); render(); }
  function onSearch(v){ q=v; render(); }
  function wireSearch(){ var el=$('q'); if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); } }

  if(token) boot(); else showLogin('');
</script>
</body>
</html>
