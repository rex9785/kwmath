<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>내 정보 | 이관우 수학연구소</title>
<link rel="manifest" href="/manifest.json?v=2">
<meta name="theme-color" content="#8B1A35">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=6">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--primary:#8B1A35;--primary-light:#F9EEF1;--primary-mid:#B02347;--text:#1E1E1E;--text-light:#666;--bg:#FFF;--bg2:#FAF7F8;--border:#EDE0E3;}
  body{font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg2);min-height:100vh;word-break:keep-all;overflow-wrap:break-word;line-break:strict;}

  .topbar{background:var(--primary);color:#fff;padding:max(14px,env(safe-area-inset-top,14px)) 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .topbar-title{font-size:0.95rem;font-weight:900;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px;color:#fff;text-decoration:none;}
  .topbar-title .logo-mark{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#fff;border-radius:6px;overflow:hidden;padding:0;}
  .topbar-title .logo-mark img{width:100%;height:100%;object-fit:cover;display:block;}
  .topbar-btn{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);color:#fff;padding:6px 12px;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;}
  .topbar-btn:hover{background:rgba(255,255,255,0.26);}

  .page{max-width:560px;margin:0 auto;padding:22px 18px 80px;}

  /* 자녀 선택 bar */
  .child-bar{background:#fff;border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .child-bar label{font-size:0.78rem;font-weight:700;color:var(--text-light);}
  .child-bar select{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:0.86rem;font-family:inherit;background:#fff;outline:none;font-weight:600;}

  /* 카드 공통 */
  .card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:16px 18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(139,26,53,0.04);}
  .card-label{font-size:0.72rem;font-weight:800;color:var(--primary);letter-spacing:0.6px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
  .card-body{font-size:0.92rem;line-height:1.7;color:var(--text);}
  .muted{color:var(--text-light);font-size:0.82rem;}

  /* 강조 카드 — 다음 수업 */
  .hero-card{background:linear-gradient(135deg,#8B1A35 0%,#6A1F2A 100%);color:#fff;border-radius:16px;padding:18px 22px;margin-bottom:12px;box-shadow:0 6px 22px rgba(139,26,53,0.18);}
  .hero-card .hero-label{font-size:0.72rem;font-weight:700;opacity:0.85;letter-spacing:0.6px;text-transform:uppercase;margin-bottom:6px;}
  .hero-card .hero-main{font-size:1.35rem;font-weight:900;letter-spacing:-0.4px;margin-bottom:4px;}
  .hero-card .hero-sub{font-size:0.82rem;opacity:0.88;}
  .hero-card .hero-pill{display:inline-block;background:rgba(255,255,255,0.18);color:#fff;font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:10px;margin-top:8px;}

  /* 숙제 카드 */
  .hw-card{background:#fff;border:2px solid var(--primary);border-radius:14px;padding:16px 18px;margin-bottom:12px;}
  .hw-meta{font-size:0.74rem;color:var(--text-light);margin-bottom:8px;}
  .hw-text{font-size:0.92rem;color:var(--text);line-height:1.75;white-space:pre-wrap;background:var(--primary-light);padding:12px 14px;border-radius:10px;}
  .hw-more{display:inline-block;margin-top:10px;font-size:0.78rem;color:var(--primary);text-decoration:none;font-weight:700;}
  .hw-more:hover{text-decoration:underline;}

  /* 기본 정보 / 성적 등 row */
  .info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--border);font-size:0.88rem;}
  .info-row:last-child{border-bottom:none;}
  .info-key{color:var(--text-light);font-weight:600;font-size:0.82rem;}
  .info-val{color:var(--text);font-weight:700;text-align:right;max-width:60%;}

  .badge-chip{display:inline-block;background:var(--primary-light);color:var(--primary);font-size:0.74rem;font-weight:700;padding:3px 9px;border-radius:8px;margin:2px 3px 2px 0;}

  .state-box{text-align:center;padding:40px 24px;color:var(--text-light);}
  .state-box .state-icon{font-size:2.2rem;margin-bottom:10px;}
  .state-box p{font-size:0.88rem;line-height:1.7;}

  /* ✏️ 정보 수정 모달 */
  .edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center;}
  .edit-overlay.open{display:flex;}
  .edit-sheet{background:#fff;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:18px 18px max(24px,env(safe-area-inset-bottom,24px));}
  .edit-title{font-size:1rem;font-weight:900;color:var(--primary);margin-bottom:2px;}
  .edit-sub{font-size:0.76rem;color:var(--text-light);margin-bottom:14px;line-height:1.6;}
  .ef-row{margin-bottom:12px;}
  .ef-row label{display:block;font-size:0.78rem;font-weight:700;color:var(--text-light);margin-bottom:5px;}
  .ef-row input[type=text],.ef-row input[type=tel],.ef-row input[type=number],.ef-row select,.ef-row textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:0.9rem;font-family:inherit;background:#fff;outline:none;}
  .ef-row textarea{min-height:64px;resize:vertical;}
  .ef-row input:disabled{background:#f4f4f6;color:#999;}
  .ef-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .chip-group{display:flex;flex-wrap:wrap;gap:6px;}
  .chip-check{display:inline-flex;align-items:center;gap:4px;border:1.5px solid var(--border);border-radius:9px;padding:7px 11px;font-size:0.82rem;font-weight:700;color:var(--text-light);cursor:pointer;user-select:none;}
  .chip-check.on{background:var(--primary-light);border-color:var(--primary);color:var(--primary);}
  .chip-check input{display:none;}
  .ef-msg{font-size:0.8rem;margin:8px 0;min-height:1.2em;}
  .ef-actions{display:flex;gap:8px;margin-top:6px;}
  .ef-actions button{flex:1;padding:12px;border-radius:10px;font-family:inherit;font-size:0.92rem;font-weight:800;cursor:pointer;}

  @media(max-width:480px){
    .info-val{max-width:55%;}
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="/portal" class="topbar-title">
    <span class="logo-mark"><img src="/icons/icon-192.png?v=6" alt="이관우 수학연구소"></span>
    <span>👤 내 정보</span>
  </a>
  <a href="/portal" class="topbar-btn">← 포털</a>
</div>

<div class="page">
  <!-- 자녀 선택 (학부모면 표시) -->
  <div id="childBar" class="child-bar" style="display:none;">
    <label>자녀 선택</label>
    <select id="childSelect" onchange="onChildChange()"></select>
  </div>

  <div id="content">
    <div class="state-box"><div class="state-icon">⏳</div><p>내 정보를 불러오는 중...</p></div>
  </div>
</div>

<!-- ✏️ 정보 수정 모달 -->
<div class="edit-overlay" id="editOverlay" onclick="if(event.target===this)closeEditModal()">
  <div class="edit-sheet">
    <div class="edit-title">✏️ 내 정보 수정</div>
    <div class="edit-sub">잘못 입력한 정보를 직접 고칠 수 있어요. 이름·학원·반 변경, 로그인에 사용 중인 번호 변경은 관우T께 문의해주세요.</div>

    <div class="ef-2col">
      <div class="ef-row"><label>학교</label><input type="text" id="efSchool" maxlength="40" placeholder="예: 대치고"></div>
      <div class="ef-row"><label>학년</label><select id="efGrade"></select></div>
    </div>
    <div class="ef-row">
      <label>학생 휴대폰</label>
      <input type="tel" id="efStudentPhone" maxlength="13" placeholder="010-0000-0000" oninput="efPhoneFmt(this)">
      <div class="muted" id="efStudentPhoneNote" style="display:none;margin-top:4px;font-size:0.72rem;"></div>
    </div>
    <div class="ef-row">
      <label>학부모 휴대폰</label>
      <input type="tel" id="efParentPhone" maxlength="13" placeholder="010-0000-0000" oninput="efPhoneFmt(this)">
      <div class="muted" id="efParentPhoneNote" style="display:none;margin-top:4px;font-size:0.72rem;"></div>
    </div>
    <div class="ef-2col">
      <div class="ef-row"><label>학부모 관계</label><select id="efRelation"></select></div>
      <div class="ef-row"><label>수학 수준</label><select id="efLevel"></select></div>
    </div>
    <div class="ef-2col">
      <div class="ef-row"><label>모의 수학 등급</label><select id="efMathMock"></select></div>
      <div class="ef-row"><label>모의 수학 점수</label><input type="number" id="efMathScore" min="0" max="100" placeholder="0~100 (선택)"></div>
    </div>
    <div class="ef-2col">
      <div class="ef-row"><label>모의 국어</label><select id="efKorMock"></select></div>
      <div class="ef-row"><label>모의 영어</label><select id="efEngMock"></select></div>
    </div>
    <div class="ef-2col">
      <div class="ef-row"><label>내신 수학</label><select id="efSchoolMath"></select></div>
      <div class="ef-row"><label>선행 진도</label><select id="efAdvance"></select></div>
    </div>
    <div class="ef-row"><label>취약 단원</label><textarea id="efWeakness" maxlength="500" placeholder="예: 미적분 급수, 확통 조합"></textarea></div>
    <div class="ef-row"><label>희망 대학·계열</label><input type="text" id="efDreamUniv" maxlength="100" placeholder="예: 서울대 공대"></div>
    <div class="ef-row"><label>등원 가능 요일</label><div class="chip-group" id="efDays"></div></div>
    <div class="ef-row"><label>수강 목적</label><div class="chip-group" id="efGoals"></div></div>

    <div class="ef-msg" id="efMsg"></div>
    <div class="ef-actions">
      <button type="button" id="efSubmit" onclick="submitEditModal()" style="background:var(--primary);color:#fff;border:none;">저장</button>
      <button type="button" onclick="closeEditModal()" style="background:#fff;color:var(--text-light);border:1.5px solid var(--border);">취소</button>
    </div>
  </div>
</div>

<script>
  const TOKEN_KEY = 'kwmath_portal_token';
  const SEL_KEY   = 'kwmath_selected_student';

  let currentToken = '';
  let currentStudents = [];
  let selectedStudent = null;

  function $(id){ return document.getElementById(id); }
  function escapeHtml(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function authHeaders(){ return { 'Authorization': 'Bearer ' + currentToken }; }
  function redirectToPortal(){ window.location.replace('/portal'); }

  // 한글 요일 → JS getDay() index
  const DAY_TO_IDX = {'일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6};
  const IDX_TO_DAY = ['일','월','화','수','목','금','토'];

  function renderChildBar(){
    if (currentStudents.length > 1) {
      $('childBar').style.display = 'flex';
      $('childSelect').innerHTML = currentStudents.map((s, i) =>
        `<option value="${i}" ${selectedStudent && s.id===selectedStudent.id?'selected':''}>${escapeHtml(s.name)}</option>`
      ).join('');
    } else {
      $('childBar').style.display = 'none';
    }
  }

  function onChildChange(){
    const idx = parseInt($('childSelect').value, 10) || 0;
    selectedStudent = currentStudents[idx];
    sessionStorage.setItem(SEL_KEY, JSON.stringify(selectedStudent));
    loadMyInfo();
  }

  async function init(){
    currentToken = localStorage.getItem(TOKEN_KEY);
    if (!currentToken) return redirectToPortal();
    try {
      const res = await fetch('/api/auth/me', { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok || !data.ok) { localStorage.removeItem(TOKEN_KEY); return redirectToPortal(); }
      currentStudents = Array.isArray(data.students) ? data.students : [];
      if (!currentStudents.length) {
        $('content').innerHTML = '<div class="state-box"><div class="state-icon">⚠️</div><p>이 휴대폰에 연결된 학생이 없습니다.<br>관우T께 문의해주세요.</p></div>';
        return;
      }
      const saved = sessionStorage.getItem(SEL_KEY);
      if (saved) {
        try {
          const sel = JSON.parse(saved);
          selectedStudent = currentStudents.find(s => s.id === sel.id || s.name === sel.name) || currentStudents[0];
        } catch (_) { selectedStudent = currentStudents[0]; }
      } else { selectedStudent = currentStudents[0]; }
      sessionStorage.setItem(SEL_KEY, JSON.stringify(selectedStudent));
      renderChildBar();
      loadMyInfo();
    } catch (e) {
      $('content').innerHTML = '<div class="state-box"><div class="state-icon">⚠️</div><p>로그인 정보를 확인할 수 없습니다.</p></div>';
    }
  }

  async function loadMyInfo(){
    if (!selectedStudent) return;
    $('content').innerHTML = '<div class="state-box"><div class="state-icon">🔍</div><p>정보를 불러오는 중...</p></div>';
    try {
      const [dRes, rRes, sRes] = await Promise.all([
        fetch('/api/me-detail?id=' + encodeURIComponent(selectedStudent.id), { headers: authHeaders() }),
        fetch('/api/reports?name=' + encodeURIComponent(selectedStudent.name), { headers: authHeaders() }),
        fetch('/api/scores?name=' + encodeURIComponent(selectedStudent.name), { headers: authHeaders() }),
      ]);
      const dData = await dRes.json();
      if (!dRes.ok || !dData.ok) {
        $('content').innerHTML = '<div class="state-box"><div class="state-icon">⚠️</div><p>' + escapeHtml(dData.error || '정보를 불러오지 못했습니다.') + '</p></div>';
        return;
      }
      let latestReport = null;
      try {
        const rData = await rRes.json();
        const reports = Array.isArray(rData) ? rData : (rData.reports || []);
        latestReport = reports[0] || null;
      } catch (_) {}
      try { const sData = await sRes.json(); curScores = (sData && sData.scores) || []; } catch (_) { curScores = []; }
      curStudentDetail = dData.student; curLatestReport = latestReport;
      renderMyInfo(dData.student, latestReport);
    } catch (e) {
      $('content').innerHTML = '<div class="state-box"><div class="state-icon">⚠️</div><p>정보를 불러오지 못했습니다.<br>잠시 후 다시 시도해주세요.</p></div>';
    }
  }

  // 다음 수업 추정 — 등원 가능 요일 기반
  function calcNextClass(availableDays){
    const days = (availableDays || []).map(d => DAY_TO_IDX[d]).filter(i => i != null);
    if (!days.length) return null;
    days.sort((a,b) => a-b);
    const today = new Date();
    const todayIdx = today.getDay();
    let nextIdx = days.find(i => i >= todayIdx);
    let daysAhead;
    if (nextIdx == null) {
      nextIdx = days[0];
      daysAhead = (7 - todayIdx) + nextIdx;
    } else {
      daysAhead = nextIdx - todayIdx;
    }
    const nextDate = new Date(today);
    nextDate.setDate(today.getDate() + daysAhead);
    return {
      date: nextDate,
      dayName: IDX_TO_DAY[nextIdx],
      daysAhead,
      regularDays: days.map(i => IDX_TO_DAY[i]),
    };
  }

  function fmtDate(d){
    const m = d.getMonth()+1;
    const day = d.getDate();
    return `${m}월 ${day}일`;
  }

  function renderMyInfo(s, latestReport){
    const next = calcNextClass(s.availableDays);

    // ── 다음 수업 hero card ──
    let heroHtml = '';
    if (next) {
      const ddayText = next.daysAhead === 0 ? '오늘' : next.daysAhead === 1 ? '내일' : `D-${next.daysAhead}`;
      const mainText = next.daysAhead === 0
        ? `오늘 ${next.dayName}요일 · 수업이 있어요!`
        : `${fmtDate(next.date)} (${next.dayName}) · ${ddayText}`;
      heroHtml = `
        <div class="hero-card">
          <div class="hero-label">🗓 다음 수업</div>
          <div class="hero-main">${escapeHtml(mainText)}</div>
          <div class="hero-sub">정기 수업 요일: ${escapeHtml(next.regularDays.join(', '))}요일</div>
          ${s.academy ? `<span class="hero-pill">${escapeHtml(s.academy)}${s.className?' · '+escapeHtml(s.className):''}</span>` : ''}
        </div>`;
    } else {
      heroHtml = `
        <div class="hero-card">
          <div class="hero-label">🗓 다음 수업</div>
          <div class="hero-main">등원 요일 미등록</div>
          <div class="hero-sub">관우T께 등원 요일 등록을 문의해주세요.</div>
        </div>`;
    }

    // ── 이번 숙제 ──
    let hwHtml = '';
    if (latestReport && latestReport.homework) {
      const dateStr = (latestReport.date || '').replace(/-/g,'.');
      hwHtml = `
        <div class="hw-card">
          <div class="card-label">📝 이번 숙제</div>
          <div class="hw-meta">${escapeHtml(dateStr)} 수업${latestReport.title ? ' · '+escapeHtml(latestReport.title) : ''}</div>
          <div class="hw-text">${escapeHtml(latestReport.homework)}</div>
          <a class="hw-more" href="/report">📋 수업 영상 및 레포트 전체 보기 →</a>
        </div>`;
    } else {
      hwHtml = `
        <div class="card">
          <div class="card-label">📝 이번 숙제</div>
          <div class="muted">${latestReport ? '이번 수업엔 등록된 숙제가 없습니다.' : '아직 등록된 수업 리포트가 없습니다.'}</div>
        </div>`;
    }

    // ── 기본 정보 ──
    const infoRows = [];
    if (s.name)      infoRows.push(['이름', escapeHtml(s.name)]);
    if (s.school)    infoRows.push(['학교', escapeHtml(s.school)]);
    if (s.grade)     infoRows.push(['학년', escapeHtml(s.grade)]);
    if (s.academy)   infoRows.push(['학원', escapeHtml(s.academy)]);
    if (s.className) infoRows.push(['반', escapeHtml(s.className)]);
    const basicHtml = `
      <div class="card">
        <div class="card-label" style="justify-content:space-between;"><span>👤 기본 정보</span><button type="button" onclick="openEditModal()" style="background:var(--primary-light);color:var(--primary);border:none;border-radius:8px;padding:5px 12px;font-size:0.76rem;font-weight:800;cursor:pointer;font-family:inherit;">✏️ 정보 수정</button></div>
        ${infoRows.map(([k,v]) => `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('')}
      </div>`;

    // ── 성적 현황 ──
    const gradeRows = [];
    if (s.mathMockGrade) gradeRows.push(['모의수학', escapeHtml(s.mathMockGrade) + (s.mathMockScore!=null ? ` (${s.mathMockScore}점)` : '')]);
    if (s.korMockGrade)  gradeRows.push(['모의국어', escapeHtml(s.korMockGrade)]);
    if (s.engMockGrade)  gradeRows.push(['모의영어', escapeHtml(s.engMockGrade)]);
    if (s.schoolMathGrade) gradeRows.push(['내신 수학', escapeHtml(s.schoolMathGrade)]);
    if (s.advanceProgress) gradeRows.push(['선행 진도', escapeHtml(s.advanceProgress)]);
    const gradeHtml = gradeRows.length ? `
      <div class="card">
        <div class="card-label">📊 성적 현황</div>
        ${gradeRows.map(([k,v]) => `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('')}
      </div>` : '';

    // ── 목표 / 특이사항 ──
    const goalRows = [];
    if (s.dreamUniv) goalRows.push(['희망 대학·계열', escapeHtml(s.dreamUniv)]);
    if (s.goals && s.goals.length) {
      goalRows.push(['수강 목적', s.goals.map(g => `<span class="badge-chip">${escapeHtml(g)}</span>`).join('')]);
    }
    if (s.weakness) goalRows.push(['취약 단원', escapeHtml(s.weakness)]);
    if (s.notes)    goalRows.push(['특이사항', escapeHtml(s.notes)]);
    const goalHtml = goalRows.length ? `
      <div class="card">
        <div class="card-label">🎓 목표 · 학습</div>
        ${goalRows.map(([k,v]) => `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('')}
      </div>` : '';

    // ── 연락처 ──
    const contactRows = [];
    if (s.parentPhone) {
      const relation = s.parentRelation ? ` (${escapeHtml(s.parentRelation)})` : '';
      contactRows.push(['👪 학부모' + relation, escapeHtml(s.parentPhone)]);
    }
    if (s.studentPhone) contactRows.push(['📱 학생', escapeHtml(s.studentPhone)]);
    const contactHtml = contactRows.length ? `
      <div class="card">
        <div class="card-label">📞 등록된 연락처</div>
        ${contactRows.map(([k,v]) => `<div class="info-row"><span class="info-key">${k}</span><span class="info-val">${v}</span></div>`).join('')}
        <div class="muted" style="margin-top:10px;font-size:0.76rem;">잘못 입력된 번호는 ✏️ 정보 수정에서 바꿀 수 있어요. (로그인 중인 번호 변경은 관우T께 문의)</div>
      </div>` : '';

    // ── 계정 (로그아웃 / 회원 탈퇴) ──
    const dangerHtml = `
      <div class="card" style="border:1px solid #f0c9c9;">
        <div class="card-label" style="color:#b23b3b;">⚙️ 계정</div>
        <button type="button" onclick="logoutMe()" style="width:100%;padding:11px;margin-bottom:8px;border:1px solid var(--border);background:#fff;color:var(--text);border-radius:10px;font-family:inherit;font-size:0.9rem;font-weight:700;cursor:pointer;">로그아웃</button>
        <button type="button" onclick="deleteMyAccount()" style="width:100%;padding:11px;border:1px solid #d98a8a;background:#fff;color:#b23b3b;border-radius:10px;font-family:inherit;font-size:0.9rem;font-weight:700;cursor:pointer;">회원 탈퇴 (계정·데이터 삭제)</button>
        <div class="muted" style="margin-top:9px;font-size:0.74rem;line-height:1.6;">회원 탈퇴 시 계정과 모든 학습 기록(수업 리포트·출결·공부 기록·시험 성적)이 영구 삭제되며 되돌릴 수 없습니다.</div>
      </div>`;

    $('content').innerHTML = heroHtml + hwHtml + basicHtml + gradeHtml + scoreCardHtml() + goalHtml + contactHtml + dangerHtml;
    syncMeLabels();
  }

  // ───────── 시험 성적 (수학) ─────────
  var curScores = [], curStudentDetail = null, curLatestReport = null;
  var editingScoreId = null, scoreMetric = 'raw', scoreTab = '내신';
  var SC_LABELS = { '내신':['1학기 중간','1학기 기말','2학기 중간','2학기 기말'],
                    '모의':['3월','4월','5월','6월','7월','9월','10월','11월(수능)'] };
  var SC_MONTH = { '1학기 중간':'04','1학기 기말':'07','2학기 중간':'10','2학기 기말':'12',
                   '3월':'03','4월':'04','5월':'05','6월':'06','7월':'07','9월':'09','10월':'10','11월(수능)':'11' };
  function scSortKey(y,l){ return (y||'')+'-'+(SC_MONTH[l]||'99'); }
  function inp(id,extra){ return 'padding:8px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:0.88rem;'+(extra||''); }

  function fmtScore(s){
    if(s.rawScore!=null && s.grade!=null) return s.rawScore+'('+s.grade+')';
    if(s.rawScore!=null) return ''+s.rawScore;
    if(s.grade!=null) return '('+s.grade+'등급)';
    return '-';
  }
  function setScoreTab(t){ scoreTab=t; renderMyInfo(curStudentDetail, curLatestReport); }
  function scoreCardHtml(){
    var data = curScores.filter(function(s){ return s.examType===scoreTab; });
    function tabBtn(t){ var on = scoreTab===t; var bg = on ? (t==='모의'?'background:#1f6f78;color:#fff;border:1px solid #1f6f78;':'background:var(--primary);color:#fff;border:1px solid var(--primary);') : 'background:#fff;color:var(--text-light);border:1px solid var(--border);';
      return '<button type="button" onclick="setScoreTab(\''+t+'\')" style="padding:6px 15px;font-family:inherit;cursor:pointer;font-size:0.82rem;font-weight:700;border-radius:8px;'+bg+'">'+(t==='모의'?'모의고사':t)+'</button>'; }
    function mBtn(m,t){ return '<button type="button" onclick="setScoreMetric(\''+m+'\')" style="border:none;padding:4px 10px;font-family:inherit;cursor:pointer;font-size:0.72rem;'+(scoreMetric===m?'background:var(--primary);color:#fff;':'background:#fff;color:var(--text-light);')+'">'+t+'</button>'; }
    var tabs = '<span style="display:inline-flex;gap:6px;">'+tabBtn('내신')+tabBtn('모의')+'</span>';
    var metricToggle = '<span style="display:inline-flex;border:1px solid var(--border);border-radius:7px;overflow:hidden;">'+mBtn('raw','원점수')+mBtn('grade','등급')+'</span>';
    var latest = data.length ? data[data.length-1] : null;
    var latestTxt = latest ? ((latest.gradeLevel?latest.gradeLevel+' ':'')+latest.label+' · '+fmtScore(latest)) : '아직 없음';
    return '<div class="card">'+
      '<div class="card-label" style="text-transform:none;margin-bottom:10px;">📈 시험 성적 (수학)</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'+tabs+metricToggle+'</div>'+
      '<div style="overflow-x:auto;margin:0 -4px 8px;">'+scChartSVG(data, scoreMetric)+'</div>'+
      '<div class="muted" style="font-size:0.8rem;">최근: '+escapeHtml(latestTxt)+'</div>'+
      '<a href="/my-scores" style="display:block;margin-top:10px;text-align:center;background:var(--primary-light);color:var(--primary);font-weight:700;font-size:0.85rem;padding:11px;border-radius:10px;text-decoration:none;">📊 성적 전체 보기 · 입력하기 →</a>'+
      '</div>';
  }

  function syncMeLabels(){
    var t = $('scType') ? $('scType').value : '내신';
    var sel = $('scLabel'); if(!sel) return;
    var keep = sel.value;
    sel.innerHTML = (SC_LABELS[t]||[]).map(function(l){ return '<option'+(l===keep?' selected':'')+'>'+escapeHtml(l)+'</option>'; }).join('');
  }
  function setScoreMetric(m){ scoreMetric=m; renderMyInfo(curStudentDetail, curLatestReport); }

  function editScore(id){
    var s = curScores.find(function(x){ return x.id===id; }); if(!s) return;
    editingScoreId = id;
    if($('scType')){ $('scType').value=s.examType||'내신'; syncMeLabels(); }
    if($('scGrade')) $('scGrade').value=s.gradeLevel||'';
    if($('scYear') && s.sortKey && s.sortKey.indexOf('-')>0) $('scYear').value=s.sortKey.split('-')[0];
    if($('scLabel')) $('scLabel').value=s.label||'';
    if($('scRaw')) $('scRaw').value=(s.rawScore!=null?s.rawScore:'');
    if($('scGr')) $('scGr').value=(s.grade!=null?s.grade:'');
    if($('scFormTitle')) $('scFormTitle').textContent='✏️ 성적 수정';
    if($('scSubmit')) $('scSubmit').textContent='수정 저장';
    if($('scCancel')) $('scCancel').style.display='';
  }
  function resetScoreForm(){
    editingScoreId=null;
    if($('scRaw')) $('scRaw').value=''; if($('scGr')) $('scGr').value='';
    if($('scFormTitle')) $('scFormTitle').textContent='➕ 성적 추가';
    if($('scSubmit')) $('scSubmit').textContent='추가';
    if($('scCancel')) $('scCancel').style.display='none';
    if($('scMsg')) $('scMsg').textContent='';
  }
  async function reloadScores(){
    try{
      var r = await fetch('/api/scores?name='+encodeURIComponent(selectedStudent.name), { headers: authHeaders() });
      var d = await r.json(); curScores = (d && d.scores) || [];
    }catch(_){}
    renderMyInfo(curStudentDetail, curLatestReport);
  }
  async function submitMyScore(){
    var type=$('scType').value, gradeLevel=$('scGrade').value, year=$('scYear').value, label=$('scLabel').value;
    var raw=$('scRaw').value, gr=$('scGr').value, msg=$('scMsg');
    if(raw==='' && gr===''){ if(msg){msg.style.color='#c0392b';msg.textContent='원점수나 등급을 입력해주세요.';} return; }
    var payload={ name:selectedStudent.name, examType:type, gradeLevel:gradeLevel, label:label, sortKey:scSortKey(year,label),
      rawScore:(raw===''?null:Number(raw)), grade:(gr===''?null:Number(gr)) };
    if(editingScoreId) payload.id=editingScoreId;
    if(msg){msg.style.color='var(--text-light)';msg.textContent='저장 중…';}
    try{
      var r = await fetch('/api/scores?name='+encodeURIComponent(selectedStudent.name), { method:'POST', headers:Object.assign({'Content-Type':'application/json'}, authHeaders()), body:JSON.stringify(payload) });
      var d = await r.json();
      if(!r.ok || d.error){ if(msg){msg.style.color='#c0392b';msg.textContent=d.error||'저장 실패';} return; }
      editingScoreId=null; reloadScores();
    }catch(e){ if(msg){msg.style.color='#c0392b';msg.textContent='네트워크 오류';} }
  }
  async function deleteMyScore(id){
    if(!confirm('이 성적을 삭제할까요?')) return;
    try{
      var r = await fetch('/api/scores?name='+encodeURIComponent(selectedStudent.name), { method:'DELETE', headers:Object.assign({'Content-Type':'application/json'}, authHeaders()), body:JSON.stringify({ id:id, name:selectedStudent.name }) });
      await r.json(); reloadScores();
    }catch(e){}
  }
  function scChartSVG(scores, m){
    var pts = scores.filter(function(s){ return m==='raw'? s.rawScore!=null : s.grade!=null; });
    if(!pts.length) return '<div class="muted" style="text-align:center;padding:18px;">표시할 데이터가 없어요.</div>';
    var W=Math.max(300, pts.length*60+44), H=210, pad={l:30,r:12,t:16,b:48};
    var iw=W-pad.l-pad.r, ih=H-pad.t-pad.b, n=pts.length;
    function xF(i){ return pad.l+(n===1? iw/2 : iw*i/(n-1)); }
    var ticks = m==='raw'?[0,50,100]:[1,5,9];
    function yF(v){ return m==='raw'? pad.t+ih*(1-v/100) : pad.t+ih*((v-1)/8); }
    var val=function(p){ return m==='raw'?p.rawScore:p.grade; };
    var s='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" font-family="Noto Sans KR,sans-serif">';
    ticks.forEach(function(t){ var y=yF(t); s+='<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="#EFE6E7"/>'; s+='<text x="'+(pad.l-5)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="#aaa">'+t+'</text>'; });
    var d=''; pts.forEach(function(p,i){ d+=(i?'L':'M')+xF(i)+' '+yF(val(p))+' '; });
    s+='<path d="'+d+'" fill="none" stroke="#8B1A35" stroke-width="2"/>';
    pts.forEach(function(p,i){ var cx=xF(i), cy=yF(val(p)), mock=p.examType==='모의';
      s+='<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="'+(mock?'#1f6f78':'#8B1A35')+'"/>';
      s+='<text x="'+cx+'" y="'+(cy-8)+'" text-anchor="middle" font-size="9.5" font-weight="700" fill="#444">'+val(p)+'</text>';
      var lab=(p.label||'').replace('(수능)','수능');
      s+='<text x="'+cx+'" y="'+(H-28)+'" text-anchor="middle" font-size="9" fill="#888">'+escapeHtml(lab)+'</text>';
      if(p.gradeLevel) s+='<text x="'+cx+'" y="'+(H-15)+'" text-anchor="middle" font-size="8.5" fill="#bbb">'+escapeHtml(p.gradeLevel)+'</text>';
    });
    s+='</svg>'; return s;
  }

  // ───────── ✏️ 내 정보 셀프 수정 ─────────
  var EF_GRADES = ['중2','중3','고1','고2','고3','N수'];
  var EF_RELATIONS = ['어머니','아버지','기타'];
  var EF_LEVELS = ['잘 모름','1등급','2등급','3등급','4등급','5등급 이하'];
  var EF_MOCK = ['1등급','2등급','3등급','4등급','5등급','6등급','7등급','8등급','9등급','미응시','모름'];
  var EF_ADVANCE = ['중3 과정','공통수학1','공통수학2','대수','미적분1','미적분2','확률과통계','기하','심화/실전','모름'];
  var EF_GOALS = ['수능','내신','기초다지기','선행'];
  var EF_DAYS = ['월','화','수','목','금','토','일','협의'];

  function efFillSelect(id, list, cur){
    var el = $(id); if(!el) return;
    var items = list.slice();
    var curV = (cur==null?'':String(cur));
    if (curV && items.indexOf(curV) < 0) items.unshift(curV); // 예전 값도 유지
    el.innerHTML = '<option value="">(선택 안 함)</option>' + items.map(function(v){
      return '<option value="'+escapeHtml(v)+'"'+(v===curV?' selected':'')+'>'+escapeHtml(v)+'</option>';
    }).join('');
  }
  function efChips(id, list, curArr){
    var el = $(id); if(!el) return;
    var set = {}; (curArr||[]).forEach(function(v){ set[String(v)] = true; });
    el.innerHTML = list.map(function(v){
      var on = !!set[v];
      return '<label class="chip-check'+(on?' on':'')+'"><input type="checkbox" value="'+escapeHtml(v)+'"'+(on?' checked':'')+
        ' onchange="this.parentNode.classList.toggle(\'on\', this.checked)">'+escapeHtml(v)+'</label>';
    }).join('');
  }
  function efChipVals(id){
    var el = $(id); if(!el) return [];
    return Array.prototype.slice.call(el.querySelectorAll('input:checked')).map(function(c){ return c.value; });
  }
  function efPhoneFmt(el){
    var d = el.value.replace(/[^0-9]/g,'').slice(0,11);
    if (d.length > 7) el.value = d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
    else if (d.length > 3) el.value = d.slice(0,3)+'-'+d.slice(3);
    else el.value = d;
  }
  function openEditModal(){
    var s = curStudentDetail; if(!s) return;
    $('efSchool').value = s.school || '';
    efFillSelect('efGrade', EF_GRADES, s.grade);
    $('efStudentPhone').value = s.studentPhone || '';
    $('efParentPhone').value = s.parentPhone || '';
    efFillSelect('efRelation', EF_RELATIONS, s.parentRelation);
    efFillSelect('efLevel', EF_LEVELS, s.level);
    efFillSelect('efMathMock', EF_MOCK, s.mathMockGrade);
    $('efMathScore').value = (s.mathMockScore!=null ? s.mathMockScore : '');
    efFillSelect('efKorMock', EF_MOCK, s.korMockGrade);
    efFillSelect('efEngMock', EF_MOCK, s.engMockGrade);
    efFillSelect('efSchoolMath', EF_MOCK, s.schoolMathGrade);
    efFillSelect('efAdvance', EF_ADVANCE, s.advanceProgress);
    $('efWeakness').value = s.weakness || '';
    $('efDreamUniv').value = s.dreamUniv || '';
    efChips('efDays', EF_DAYS, s.availableDays);
    efChips('efGoals', EF_GOALS, s.goals);
    // 로그인 중인 번호는 잠금 (계정 연결 끊김 방지 — 서버에서도 막음)
    var role = (selectedStudent && selectedStudent.role) || '';
    var lockNote = '로그인에 사용 중인 번호예요. 변경은 관우T께 문의해주세요.';
    var sp = $('efStudentPhone'), pp = $('efParentPhone');
    sp.disabled = false; pp.disabled = false;
    $('efStudentPhoneNote').style.display = 'none';
    $('efParentPhoneNote').style.display = 'none';
    if (role === 'student') { sp.disabled = true; $('efStudentPhoneNote').textContent = lockNote; $('efStudentPhoneNote').style.display = 'block'; }
    if (role === 'parent') { pp.disabled = true; $('efParentPhoneNote').textContent = lockNote; $('efParentPhoneNote').style.display = 'block'; }
    $('efMsg').textContent = '';
    $('editOverlay').classList.add('open');
  }
  function closeEditModal(){ $('editOverlay').classList.remove('open'); }
  async function submitEditModal(){
    var s = curStudentDetail; if(!s) return;
    var msg = $('efMsg');
    var patch = {};
    function diffStr(key, val){ if (String(val||'') !== String(s[key]||'')) patch[key] = val; }
    diffStr('school', $('efSchool').value.trim());
    var g = $('efGrade').value; if (g && g !== String(s.grade||'')) patch.grade = g;
    if (!$('efStudentPhone').disabled) { var sv = $('efStudentPhone').value.trim(); if (sv && sv !== String(s.studentPhone||'')) patch.studentPhone = sv; }
    if (!$('efParentPhone').disabled) { var pv = $('efParentPhone').value.trim(); if (pv && pv !== String(s.parentPhone||'')) patch.parentPhone = pv; }
    var rel = $('efRelation').value; if (rel && rel !== String(s.parentRelation||'')) patch.parentRelation = rel;
    var lv = $('efLevel').value; if (lv && lv !== String(s.level||'')) patch.level = lv;
    var mm = $('efMathMock').value; if (mm && mm !== String(s.mathMockGrade||'')) patch.mathMockGrade = mm;
    var ms = $('efMathScore').value;
    var curMs = (s.mathMockScore!=null ? String(s.mathMockScore) : '');
    if (ms !== curMs) patch.mathMockScore = (ms === '' ? '' : Number(ms));
    var km = $('efKorMock').value; if (km && km !== String(s.korMockGrade||'')) patch.korMockGrade = km;
    var em = $('efEngMock').value; if (em && em !== String(s.engMockGrade||'')) patch.engMockGrade = em;
    var sm = $('efSchoolMath').value; if (sm && sm !== String(s.schoolMathGrade||'')) patch.schoolMathGrade = sm;
    var ad = $('efAdvance').value; if (ad && ad !== String(s.advanceProgress||'')) patch.advanceProgress = ad;
    diffStr('weakness', $('efWeakness').value.trim());
    diffStr('dreamUniv', $('efDreamUniv').value.trim());
    var days = efChipVals('efDays');
    if (JSON.stringify(days) !== JSON.stringify(s.availableDays||[])) patch.availableDays = days;
    var goals = efChipVals('efGoals');
    if (JSON.stringify(goals) !== JSON.stringify(s.goals||[])) patch.goals = goals;

    if (!Object.keys(patch).length) { msg.style.color = 'var(--text-light)'; msg.textContent = '바뀐 내용이 없어요.'; return; }
    msg.style.color = 'var(--text-light)'; msg.textContent = '저장 중…';
    $('efSubmit').disabled = true;
    try {
      var r = await fetch('/api/me-update', { method:'POST',
        headers: Object.assign({'Content-Type':'application/json'}, authHeaders()),
        body: JSON.stringify({ id: String(s.id), patch: patch }) });
      var d = await r.json();
      if (!r.ok || !d.ok) { msg.style.color = '#c0392b'; msg.textContent = (d && d.error) || '저장에 실패했어요.'; return; }
      msg.style.color = '#1f7a3f'; msg.textContent = '✅ 저장되었어요!';
      setTimeout(function(){ closeEditModal(); loadMyInfo(); }, 600);
    } catch(e) {
      msg.style.color = '#c0392b'; msg.textContent = '네트워크 오류가 발생했어요.';
    } finally {
      $('efSubmit').disabled = false;
    }
  }

  function logoutMe(){
    try{ localStorage.removeItem(TOKEN_KEY); sessionStorage.removeItem(SEL_KEY); }catch(_){ }
    location.href='/portal';
  }
  async function deleteMyAccount(){
    if(!confirm('정말 회원 탈퇴할까요?\n계정과 모든 학습 기록(리포트·출결·공부·성적)이 영구 삭제되며 되돌릴 수 없습니다.')) return;
    var typed = prompt('탈퇴를 확인하려면 "삭제" 를 입력하세요.');
    if(typed !== '삭제'){ alert('취소되었습니다.'); return; }
    try{
      var r = await fetch('/api/account-delete', { method:'POST', headers:Object.assign({'Content-Type':'application/json'}, authHeaders()), body:JSON.stringify({ confirm:'삭제' }) });
      var d = await r.json();
      if(!r.ok || !d.ok){ alert((d && d.error) || '탈퇴 처리에 실패했습니다. 잠시 후 다시 시도해주세요.'); return; }
      alert('회원 탈퇴가 완료되었습니다. 그동안 이용해 주셔서 감사합니다.');
      try{ localStorage.removeItem(TOKEN_KEY); sessionStorage.clear(); }catch(_){ }
      location.href='/portal';
    }catch(e){ alert('네트워크 오류로 탈퇴에 실패했습니다.'); }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
