<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 포스터 생성기 — 관우T 전용</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--primary:#8B1A35;--primary-light:#F9EEF1;--primary-mid:#B02347;--text:#1E1E1E;--text-light:#666;--bg2:#FAF7F8;--border:#EDE0E3;}
  body{font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg2);min-height:100vh;padding:24px 16px;word-break:keep-all;}
  .container{max-width:760px;margin:0 auto;background:#fff;border-radius:20px;padding:32px 28px;box-shadow:0 8px 30px rgba(139,26,53,0.10);border:1px solid var(--border);}
  h1{font-size:1.4rem;color:var(--primary);margin-bottom:6px;}
  .sub{color:var(--text-light);font-size:0.88rem;margin-bottom:28px;line-height:1.6;}
  label{display:block;font-weight:700;font-size:0.85rem;margin:14px 0 6px;}
  input[type=text],select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:0.95rem;font-family:inherit;outline:none;}
  input[type=text]:focus,select:focus{border-color:var(--primary);}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .preset{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px;}
  .preset button{background:var(--primary-light);color:var(--primary);border:1px solid #E8C4C7;padding:7px 14px;border-radius:8px;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:inherit;}
  .preset button:hover{background:#F4D8DC;}
  .preset button.on{background:var(--primary);color:#fff;border-color:var(--primary);}
  .qr-wrap{margin-top:24px;text-align:center;padding:24px;background:var(--bg2);border-radius:14px;border:1px dashed var(--border);}
  #qrCanvas{max-width:100%;height:auto;background:#fff;border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,0.06);}
  .qr-caption{margin-top:14px;font-size:0.84rem;color:var(--text-light);}
  .btn-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;justify-content:center;}
  .btn{background:var(--primary);color:#fff;border:none;padding:11px 22px;border-radius:10px;font-weight:700;cursor:pointer;font-family:inherit;font-size:0.92rem;}
  .btn:hover{background:var(--primary-mid);}
  .btn.alt{background:#fff;color:var(--primary);border:1.5px solid var(--primary);}
  .info{background:var(--primary-light);border-left:3px solid var(--primary);padding:14px 16px;border-radius:8px;margin-top:18px;font-size:0.84rem;line-height:1.7;color:var(--text);}
  .info b{color:var(--primary);}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a0a0f;color:#fff;padding:12px 22px;border-radius:12px;opacity:0;transition:opacity .25s;z-index:9999;font-size:0.88rem;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="container">
  <h1>QR 포스터 생성기</h1>
  <div class="sub">학원 포스터·카톡 안내·등록 서류용 QR 코드. 만든 즉시 PNG로 다운로드.</div>

  <label>QR이 가리킬 URL</label>
  <input type="text" id="qrUrl" value="https://kwmath.co.kr/install">
  <div class="preset">
    <button data-url="https://kwmath.co.kr/install" class="on">설치 안내 (추천)</button>
    <button data-url="https://kwmath.co.kr/portal">포털 직접</button>
    <button data-url="https://kwmath.co.kr/register">학생 등록</button>
    <button data-url="https://kwmath.co.kr/">메인 홈피</button>
  </div>

  <div class="row">
    <div>
      <label>사이즈 (px)</label>
      <select id="qrSize">
        <option value="256">256 (카톡)</option>
        <option value="512" selected>512 (포스터)</option>
        <option value="1024">1024 (A4)</option>
        <option value="2048">2048 (대형)</option>
      </select>
    </div>
    <div>
      <label>에러 정정 수준</label>
      <select id="qrLevel">
        <option value="L">L (낮음)</option>
        <option value="M">M (보통)</option>
        <option value="H" selected>H (높음, 로고용)</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div>
      <label>가운데 로고</label>
      <select id="qrLogo">
        <option value="logo" selected>학원 로고 (어플 아이콘)</option>
        <option value="k-box">K 박스 (텍스트)</option>
        <option value="none">없음</option>
      </select>
    </div>
    <div>
      <label>로고 크기 (QR 대비)</label>
      <select id="qrLogoScale">
        <option value="0.14">14% 작게</option>
        <option value="0.18" selected>18% 권장</option>
        <option value="0.22">22% 크게</option>
      </select>
    </div>
  </div>

  <div class="qr-wrap">
    <canvas id="qrCanvas"></canvas>
    <div class="qr-caption">우클릭 또는 길게 눌러서 저장하셔도 됩니다</div>
    <div class="btn-row">
      <button class="btn" onclick="downloadPng()">PNG 다운로드</button>
      <button class="btn alt" onclick="copyImage()">이미지 복사 (카톡용)</button>
    </div>
  </div>

  <div class="info">
    <b>운영 팁</b><br>
    포스터 인쇄: 512~1024 사이즈, 최소 가로 4cm 이상<br>
    카톡 공유: 256 사이즈로 충분, "이미지 복사" 후 채팅에 붙여넣기<br>
    iOS·Android 기본 카메라가 QR 자동 인식 → 한 번 탭으로 설치 안내 페이지 열림<br>
    로고 크기 18% + 에러 정정 H로 두면 스캔 안정성 최적
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script>
  const canvas = document.getElementById('qrCanvas');
  let logoImg = null;
  const _img = new Image();
  _img.crossOrigin = 'anonymous';
  _img.onload = function() { logoImg = _img; render(); };
  _img.onerror = function() { logoImg = null; };
  _img.src = '/icons/qr-center-logo.png';

  function render() {
    const url = document.getElementById('qrUrl').value.trim() || 'https://kwmath.co.kr/install';
    const size = parseInt(document.getElementById('qrSize').value, 10);
    const level = document.getElementById('qrLevel').value;
    const logoMode = document.getElementById('qrLogo').value;
    const logoScale = parseFloat(document.getElementById('qrLogoScale').value);
    new QRious({
      element: canvas, value: url, size: size, level: level,
      background: '#ffffff', foreground: '#8B1A35',
      padding: Math.round(size * 0.06)
    });
    if (logoMode === 'none') return;
    drawCenterLogo(logoMode, logoScale);
  }

  function drawCenterLogo(mode, scale) {
    const ctx = canvas.getContext('2d');
    const size = canvas.width;
    // 실제로 그려진 QR 모듈 영역의 중심을 찾아서 거기에 로고를 놓는다.
    // (QRious가 작은 사이즈에서 모듈 반올림 잔여 공간을 우하단에 남기는 문제 회피)
    const qrBounds = findQrBounds(ctx, size);
    const cx = (qrBounds.minX + qrBounds.maxX) / 2;
    const cy = (qrBounds.minY + qrBounds.maxY) / 2;
    const logoSize = Math.round(size * scale);
    const x = Math.round(cx - logoSize / 2);
    const y = Math.round(cy - logoSize / 2);
    const pad = Math.round(logoSize * 0.12);
    const radius = Math.round(logoSize * 0.18);
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, x - pad, y - pad, logoSize + pad * 2, logoSize + pad * 2, radius);
    ctx.fill();
    if (mode === 'logo' && logoImg) {
      ctx.drawImage(logoImg, x, y, logoSize, logoSize);
    } else {
      drawKBox(ctx, x, y, logoSize, cx, cy);
    }
  }

  function findQrBounds(ctx, size) {
    // 크림슨 전경(#8B1A35) 픽셀의 bounding box를 찾아 시각 중심 계산
    const data = ctx.getImageData(0, 0, size, size).data;
    let minX = size, minY = size, maxX = 0, maxY = 0;
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const i = (y * size + x) * 4;
        // 크림슨 픽셀 검출 (R 100~200, G <80, B 30~100)
        if (data[i] > 100 && data[i] < 200 && data[i+1] < 80 && data[i+2] > 30 && data[i+2] < 100) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
    // 검출 실패 시 캔버스 중심 fallback
    if (maxX === 0) return { minX: 0, minY: 0, maxX: size, maxY: size };
    return { minX, minY, maxX, maxY };
  }

  function drawKBox(ctx, x, y, logoSize, cx, cy) {
    ctx.fillStyle = '#8B1A35';
    roundRect(ctx, x, y, logoSize, logoSize, Math.round(logoSize * 0.22));
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = '900 ' + Math.round(logoSize * 0.62) + 'px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('K', cx, cy + logoSize * 0.02);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._h);
    t._h = setTimeout(function() { t.classList.remove('show'); }, 2500);
  }

  function downloadPng() {
    const a = document.createElement('a');
    const size = document.getElementById('qrSize').value;
    a.href = canvas.toDataURL('image/png');
    a.download = 'kwmath-qr-' + size + '.png';
    a.click();
    showToast('다운로드 시작');
  }

  async function copyImage() {
    try {
      const blob = await new Promise(function(r) { canvas.toBlob(r, 'image/png'); });
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
      showToast('이미지가 클립보드에 복사됐어요');
    } catch (e) {
      showToast('복사 실패 — 우클릭으로 저장해주세요');
    }
  }

  document.getElementById('qrUrl').addEventListener('input', render);
  document.getElementById('qrSize').addEventListener('change', render);
  document.getElementById('qrLevel').addEventListener('change', render);
  document.getElementById('qrLogo').addEventListener('change', render);
  document.getElementById('qrLogoScale').addEventListener('change', render);
  document.querySelectorAll('.preset button').forEach(function(b) {
    b.addEventListener('click', function() {
      document.querySelectorAll('.preset button').forEach(function(x) { x.classList.remove('on'); });
      b.classList.add('on');
      document.getElementById('qrUrl').value = b.dataset.url;
      render();
    });
  });
  render();
</script>
</body>
</html>
