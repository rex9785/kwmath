<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자료실 | 이관우 수학연구소</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --primary:#862633;--primary-light:#F9ECED;--primary-mid:#A83040;
    --text:#1E1E1E;--text-light:#666;--bg:#FFF;--bg2:#FAF7F7;--border:#EDE0E1;
  }
  body{font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg2);min-height:100vh;}

  .topbar{background:var(--primary);padding:14px 5%;display:flex;align-items:center;justify-content:space-between;}
  .topbar-logo{color:#fff;font-size:0.95rem;font-weight:900;text-decoration:none;}
  .topbar-back{color:rgba(255,255,255,0.8);font-size:0.83rem;text-decoration:none;}
  .topbar-back:hover{color:#fff;}

  .page-wrap{max-width:800px;margin:0 auto;padding:48px 5% 80px;}

  .page-header{margin-bottom:36px;}
  .page-header h1{font-size:1.8rem;font-weight:900;margin-bottom:8px;}
  .page-header p{font-size:0.9rem;color:var(--text-light);line-height:1.7;}

  /* 필터 탭 */
  .filter-tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
  .filter-tab{padding:8px 18px;border:1.5px solid var(--border);border-radius:20px;background:#fff;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-light);transition:all .2s;}
  .filter-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  /* 파일 카드 */
  .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .file-card{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:12px;box-shadow:0 2px 12px rgba(134,38,51,0.05);transition:box-shadow .2s;}
  .file-card:hover{box-shadow:0 4px 20px rgba(134,38,51,0.12);}
  .file-icon{font-size:2rem;}
  .file-title{font-size:0.95rem;font-weight:700;line-height:1.4;}
  .file-meta{font-size:0.78rem;color:var(--text-light);display:flex;gap:10px;flex-wrap:wrap;}
  .file-cat{background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:10px;font-weight:700;}
  .file-dl-btn{background:var(--primary);color:#fff;border:none;padding:10px;border-radius:10px;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;text-align:center;}
  .file-dl-btn:hover{background:var(--primary-mid);}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-light);}
  .empty-state .icon{font-size:3rem;margin-bottom:14px;}
  .empty-state p{font-size:0.9rem;line-height:1.8;}

  .loading{text-align:center;padding:40px;color:var(--text-light);font-size:0.9rem;}

  /* 카카오 플로팅 */
  .kakao-float{position:fixed;bottom:28px;right:24px;z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .kakao-float a{display:flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;background:#FEE500;box-shadow:0 4px 16px rgba(0,0,0,0.18);transition:transform .2s;}
  .kakao-float a:hover{transform:scale(1.08);}
  .kakao-label{font-size:0.65rem;font-weight:700;color:#333;background:#fff;padding:2px 8px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.12);}

  @media(max-width:600px){
    .file-grid{grid-template-columns:1fr;}
    .page-header h1{font-size:1.4rem;}
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="/portal" class="topbar-logo">📐 이관우 수학연구소</a>
  <a href="/portal" class="topbar-back">← 포털로</a>
</div>

<div class="page-wrap">
  <div class="page-header">
    <h1>📁 자료실</h1>
    <p>관우T가 직접 제작한 수업 자료를 자유롭게 다운로드하세요.<br>
    수강생 개인 리포트·반 전용 자료는 <strong>포털에서 로그인 후</strong> 확인할 수 있습니다.</p>
  </div>

  <!-- 카테고리 필터 -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('', this)">전체</button>
    <button class="filter-tab" onclick="setFilter('수업자료', this)">📚 수업자료</button>
    <button class="filter-tab" onclick="setFilter('교재', this)">📖 교재</button>
    <button class="filter-tab" onclick="setFilter('기타', this)">📎 기타</button>
  </div>

  <div id="fileGrid" class="file-grid">
    <div class="loading">자료를 불러오는 중...</div>
  </div>
</div>

<!-- 카카오 플로팅 -->
<div class="kakao-float">
  <a href="https://pf.kakao.com/_lIbJG" target="_blank" rel="noopener noreferrer" title="카카오채널 문의">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="#3C1E1E">
      <path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.69 1.7 5.05 4.26 6.4L6.3 20.25c-.07.22.14.42.35.3L11.1 17.9c.3.03.6.05.9.05 4.97 0 9-3.36 9-7.45S16.97 3 12 3z"/>
    </svg>
  </a>
  <span class="kakao-label">문의</span>
</div>

<script>
let currentCategory = '';
let allFiles = [];
const TOKEN_KEY = 'kwmath_portal_token', SEL_KEY = 'kwmath_selected_student';
let myStudentName = '';

function getFileIcon(fileName) {
  const ext = (fileName || '').split('.').pop().toLowerCase();
  const icons = { pdf:'📄', hwp:'📝', hwpx:'📝', docx:'📝', doc:'📝', xlsx:'📊', xls:'📊', pptx:'📊', ppt:'📊', zip:'🗜️', png:'🖼️', jpg:'🖼️', jpeg:'🖼️' };
  return icons[ext] || '📁';
}

function setFilter(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFiles(cat ? allFiles.filter(f => f.category === cat) : allFiles);
}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function renderFiles(files) {
  const grid = document.getElementById('fileGrid');
  if (!files.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📭</div><p>등록된 자료가 없습니다.</p></div>`;
    return;
  }
  grid.innerHTML = files.map(f => `
    <div class="file-card">
      <div class="file-icon">${getFileIcon(f.fileName)}</div>
      <div class="file-title">${esc(f.title || f.fileName)}</div>
      <div class="file-meta">
        ${f.category ? `<span class="file-cat">${esc(f.category)}</span>` : ''}
        <span>${esc(f.fileSize || '')}</span>
        <span>${f.uploadDate ? esc(f.uploadDate.replace(/-/g, '.')) : ''}</span>
      </div>
      <button class="file-dl-btn" data-key="${esc(f.r2Key)}">⬇ 다운로드</button>
    </div>
  `).join('');
  grid.querySelectorAll('.file-dl-btn').forEach(function(b){ b.addEventListener('click', function(){ downloadFile(b.getAttribute('data-key')); }); });
}

// list-files.js 항목 → 카드 형식으로 매핑
function fromClassEntry(e) {
  return {
    title: e.displayName || e.name,
    fileName: e.displayName || e.name,
    r2Key: e.key,
    category: '수업자료',
    fileSize: e.sizeLabel || '',
    uploadDate: e.lastModified ? String(e.lastModified).slice(0, 10) : '',
  };
}

// 로그인한 학생의 '반 전용' R2 자료(class/{학원}_{반}/) 로드
async function loadClassFiles(token) {
  try {
    const meRes = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
    const me = await meRes.json();
    if (!meRes.ok || !me.ok || !Array.isArray(me.students) || !me.students.length) return [];
    let sel = null; try { sel = JSON.parse(sessionStorage.getItem(SEL_KEY)); } catch(_) {}
    const student = (sel && me.students.find(s => s.id === sel.id || s.name === sel.name)) || me.students[0];
    if (!student || !student.academy || !student.className) return [];
    myStudentName = student.name || '';
    const folder = 'class/' + student.academy + '_' + student.className;
    const r = await fetch('/api/list-files?folder=' + encodeURIComponent(folder) + '&name=' + encodeURIComponent(student.name), { headers: { 'Authorization': 'Bearer ' + token } });
    if (!r.ok) return [];
    const arr = await r.json();
    return Array.isArray(arr) ? arr.map(fromClassEntry) : [];
  } catch(e) { return []; }
}

// 공개 자료(materials/) 로드
async function loadPublicFiles() {
  try {
    const res = await fetch('/api/materials');
    const arr = await res.json();
    return Array.isArray(arr) ? arr : [];
  } catch(e) { return []; }
}

async function loadFiles() {
  const token = localStorage.getItem(TOKEN_KEY);
  const [pub, cls] = await Promise.all([
    loadPublicFiles(),
    token ? loadClassFiles(token) : Promise.resolve([]),
  ]);
  // 반 전용 자료 먼저, 그다음 공개 자료. r2Key로 중복 제거
  const seen = new Set();
  allFiles = [];
  for (const f of cls.concat(pub)) {
    const k = f.r2Key || (f.title + '|' + f.uploadDate);
    if (seen.has(k)) continue;
    seen.add(k); allFiles.push(f);
  }
  renderFiles(allFiles);
}

function downloadFile(r2Key) {
  if (!r2Key) return;
  const token = localStorage.getItem(TOKEN_KEY);
  const isProtected = r2Key.indexOf('class/') === 0 || r2Key.indexOf('reports/') === 0;
  let url = `/api/download-file?key=${encodeURIComponent(r2Key)}`;
  if (isProtected && myStudentName) url += `&name=${encodeURIComponent(myStudentName)}`;
  // 공개 자료는 단순 이동(브라우저가 attachment 헤더로 자동 다운로드)
  if (!isProtected) { window.location.href = url; return; }
  // 반 전용·리포트 자료는 Authorization 헤더가 필요 → fetch 후 blob 다운로드
  fetch(url, { headers: token ? { 'Authorization': 'Bearer ' + token } : {} })
    .then(r => { if (!r.ok) throw new Error('다운로드 권한이 없습니다.'); return r.blob().then(b => ({ b, r })); })
    .then(({ b, r }) => {
      const cd = r.headers.get('Content-Disposition') || '';
      const m = cd.match(/filename\*=UTF-8''([^;]+)/);
      const fname = (m ? decodeURIComponent(m[1]) : '') || r2Key.split('/').pop();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b); a.download = fname;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    })
    .catch(err => alert(err.message || '다운로드에 실패했습니다.'));
}

loadFiles();
</script>
</body>
</html>
