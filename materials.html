<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>자료실 | 이관우 수학연구소</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;600;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{--primary:#8B1A35;--primary-light:#F9EEF1;--primary-mid:#B02347;--text:#241318;--text-light:#9A8C85;--bg:#FFF;--bg2:#FAF9F6;--border:#E9E1D9;--hairline:#F1EAE2;--gold:#A8863D;--gold-line:#DEC98F;--gold-bright:#E3B655;--serif:'Noto Serif KR',serif;}
  body{font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif;letter-spacing:-0.01em;color:var(--text);background:var(--bg2);min-height:100vh;word-break:keep-all;overflow-wrap:break-word;line-break:strict;}

  .topbar{background:var(--primary);color:#fff;padding:max(14px,env(safe-area-inset-top,14px)) 20px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .topbar-title{font-size:0.95rem;font-weight:900;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px;text-decoration:none;color:#fff;}
  .topbar-title .logo-mark{display:inline-flex;align-items:center;justify-content:center;width:30px;height:26px;background:#fff;border-radius:6px;overflow:hidden;padding:0;}
  .topbar-title .logo-mark img{width:100%;height:100%;object-fit:cover;display:block;}
  .topbar-btn{background:rgba(255,255,255,0.16);border:1px solid rgba(255,255,255,0.28);color:#fff;padding:6px 12px;border-radius:8px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;}

  .page-wrap{max-width:800px;margin:0 auto;padding:48px 5% 80px;}

  .page-header{margin-bottom:36px;}
  .page-header h1{font-size:1.8rem;font-weight:900;margin-bottom:8px;}
  .page-header p{font-size:0.9rem;color:var(--text-light);line-height:1.7;}

  /* 필터 탭 */
  .filter-tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
  .filter-tab{padding:8px 18px;border:1.5px solid var(--border);border-radius:20px;background:#fff;font-size:0.85rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text-light);transition:all .2s;}
  .filter-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  /* 파일 카드 */
  .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .file-card{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:12px;box-shadow:0 2px 10px rgba(70,20,35,.05);transition:box-shadow .2s;}
  .file-card:hover{box-shadow:0 4px 14px rgba(70,20,35,.09);}
  .file-icon{color:var(--primary);display:flex;}
  .file-title{font-size:0.95rem;font-weight:700;line-height:1.4;}
  .file-meta{font-size:0.78rem;color:var(--text-light);display:flex;gap:10px;flex-wrap:wrap;}
  .file-cat{background:var(--primary-light);color:var(--primary);padding:2px 8px;border-radius:10px;font-weight:700;}
  .file-dl-btn{background:var(--primary);color:#fff;border:none;padding:10px;border-radius:10px;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;text-align:center;}
  .file-dl-btn:hover{background:var(--primary-mid);}
  .file-dl-btn.locked{background:#888;}
  .file-dl-btn.locked:hover{background:#6f6f6f;}
  .file-dl-btn:disabled{background:#b0b0b0;cursor:default;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-light);}
  .empty-state .icon{color:var(--text-light);margin-bottom:14px;display:flex;justify-content:center;}
  .empty-state p{font-size:0.9rem;line-height:1.8;}

  .loading{text-align:center;padding:40px;color:var(--text-light);font-size:0.9rem;}

  /* 카카오 플로팅 */
  .kakao-float{position:fixed;bottom:28px;right:24px;z-index:999;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .kakao-float a{display:flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;background:#FEE500;box-shadow:0 4px 16px rgba(0,0,0,0.18);transition:transform .2s;}
  .kakao-float a:hover{transform:scale(1.08);}
  .kakao-label{font-size:0.65rem;font-weight:700;color:#333;background:#fff;padding:2px 8px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.12);}

  @media(max-width:600px){
    .file-grid{grid-template-columns:1fr;}
    .page-header h1{font-size:1.4rem;}
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="/portal" class="topbar-title">
    <span class="logo-mark"><img src="/icons/icon-192.png?v=6" alt="이관우 수학연구소"></span>
    <span>자료실</span>
  </a>
  <a href="/portal" class="topbar-btn">← 포털</a>
</div>

<div class="page-wrap">
  <div class="page-header">
    <h1>자료실</h1>
    <p>관우T가 직접 제작한 수업 자료를 자유롭게 다운로드하세요.<br>
    수강생 개인 리포트·반 전용 자료는 <strong>포털에서 로그인 후</strong> 확인할 수 있습니다.</p>
  </div>

  <!-- 카테고리 필터 -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('', this)">전체</button>
    <button class="filter-tab" onclick="setFilter('수업자료', this)">수업자료</button>
    <button class="filter-tab" onclick="setFilter('교재', this)">교재</button>
    <button class="filter-tab" onclick="setFilter('기타', this)">기타</button>
  </div>

  <div id="fileGrid" class="file-grid">
    <div class="loading">자료를 불러오는 중...</div>
  </div>
</div>

<!-- 카카오 플로팅 -->
<div class="kakao-float">
  <a href="https://pf.kakao.com/_lIbJG" target="_blank" rel="noopener noreferrer" title="카카오채널 문의">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="#3C1E1E">
      <path d="M12 3C7.03 3 3 6.36 3 10.5c0 2.69 1.7 5.05 4.26 6.4L6.3 20.25c-.07.22.14.42.35.3L11.1 17.9c.3.03.6.05.9.05 4.97 0 9-3.36 9-7.45S16.97 3 12 3z"/>
    </svg>
  </a>
  <span class="kakao-label">문의</span>
</div>

<script>
let currentCategory = '';
let allFiles = [];
const TOKEN_KEY = 'kwmath_portal_token', SEL_KEY = 'kwmath_selected_student';
let myStudentName = '';

function getFileIcon(fileName) {
  const ext = (fileName || '').split('.').pop().toLowerCase();
  const P = {
    doc: '<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/>',
    sheet: '<path d="M6 20V12"/><path d="M12 20V5"/><path d="M18 20V9"/>',
    img: '<rect x="3.5" y="5" width="17" height="14" rx="2.5"/><circle cx="9" cy="10.2" r="1.6"/><path d="m5.5 17.5 4.5-4.5 3 3 3-3 2.5 2.5"/>',
    zip: '<path d="M3.5 8A2.5 2.5 0 0 1 6 5.5h4.2L12 8h6a2.5 2.5 0 0 1 2.5 2.5V17A2.5 2.5 0 0 1 18 19.5H6A2.5 2.5 0 0 1 3.5 17z"/>',
    file: '<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/>'
  };
  const map = { pdf:'doc', hwp:'doc', hwpx:'doc', docx:'doc', doc:'doc', xlsx:'sheet', xls:'sheet', pptx:'sheet', ppt:'sheet', zip:'zip', png:'img', jpg:'img', jpeg:'img' };
  return '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' + (P[map[ext] || 'file'] || P.file) + '</svg>';
}

function setFilter(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFiles(cat ? allFiles.filter(f => f.category === cat) : allFiles);
}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function renderFiles(files) {
  const grid = document.getElementById('fileGrid');
  if (!files.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 8A2.5 2.5 0 0 1 6 5.5h4.2L12 8h6a2.5 2.5 0 0 1 2.5 2.5V17A2.5 2.5 0 0 1 18 19.5H6A2.5 2.5 0 0 1 3.5 17z"/></svg></div><p>등록된 자료가 없습니다.</p></div>`;
    return;
  }
  grid.innerHTML = files.map(f => `
    <div class="file-card">
      <div class="file-icon">${getFileIcon(f.fileName)}</div>
      <div class="file-title">${esc(f.title || f.fileName)}</div>
      <div class="file-meta">
        ${f.category ? `<span class="file-cat">${esc(f.category)}</span>` : ''}
        <span>${esc(f.fileSize || '')}</span>
        <span>${f.uploadDate ? esc(f.uploadDate.replace(/-/g, '.')) : ''}</span>
      </div>
      ${f.locked && f.lockReason === 'absent'
        ? `<button class="file-dl-btn locked file-req-btn" data-date="${esc(f.lockDate)}" ${f.requested ? 'disabled' : ''}>${f.requested ? '인강 신청됨 · 승인 대기' : '인강 신청하기'}</button>`
        : `<button class="file-dl-btn" data-key="${esc(f.r2Key)}">다운로드</button>`}
    </div>
  `).join('');
  grid.querySelectorAll('.file-dl-btn:not(.file-req-btn)').forEach(function(b){ b.addEventListener('click', function(){ downloadFile(b.getAttribute('data-key')); }); });
  grid.querySelectorAll('.file-req-btn').forEach(function(b){ b.addEventListener('click', function(){ requestMaterialMakeup(b.getAttribute('data-date'), b); }); });
}

// list-files.js 항목 → 카드 형식으로 매핑
function fromClassEntry(e) {
  return {
    title: e.displayName || e.name,
    fileName: e.displayName || e.name,
    r2Key: e.key,
    category: '수업자료',
    fileSize: e.sizeLabel || '',
    uploadDate: e.lastModified ? String(e.lastModified).slice(0, 10) : '',
    locked: !!e.locked, lockReason: e.lockReason || '', lockDate: e.lockDate || '', requested: !!e.requested,
  };
}

// 로그인한 학생의 '반 전용' R2 자료(class/{학원}_{반}/) 로드
async function loadClassFiles(token) {
  try {
    const meRes = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
    const me = await meRes.json();
    if (!meRes.ok || !me.ok || !Array.isArray(me.students) || !me.students.length) return [];
    let sel = null; try { sel = JSON.parse(sessionStorage.getItem(SEL_KEY)); } catch(_) {}
    const student = (sel && me.students.find(s => s.id === sel.id || s.name === sel.name)) || me.students[0];
    if (!student || !student.academy || !student.className) return [];
    myStudentName = student.name || '';
    const folder = 'class/' + student.academy + '_' + student.className;
    const r = await fetch('/api/list-files?folder=' + encodeURIComponent(folder) + '&name=' + encodeURIComponent(student.name), { headers: { 'Authorization': 'Bearer ' + token } });
    if (!r.ok) return [];
    const arr = await r.json();
    return Array.isArray(arr) ? arr.map(fromClassEntry) : [];
  } catch(e) { return []; }
}

// 공개 자료(materials/) 로드
async function loadPublicFiles() {
  try {
    const res = await fetch('/api/materials');
    const arr = await res.json();
    return Array.isArray(arr) ? arr : [];
  } catch(e) { return []; }
}

async function loadFiles() {
  const token = localStorage.getItem(TOKEN_KEY);
  const [pub, cls] = await Promise.all([
    loadPublicFiles(),
    token ? loadClassFiles(token) : Promise.resolve([]),
  ]);
  // 반 전용 자료 먼저, 그다음 공개 자료. r2Key로 중복 제거
  const seen = new Set();
  allFiles = [];
  for (const f of cls.concat(pub)) {
    const k = f.r2Key || (f.title + '|' + f.uploadDate);
    if (seen.has(k)) continue;
    seen.add(k); allFiles.push(f);
  }
  renderFiles(allFiles);
}

function downloadFile(r2Key) {
  if (!r2Key) return;
  const token = localStorage.getItem(TOKEN_KEY);
  const isProtected = r2Key.indexOf('class/') === 0 || r2Key.indexOf('reports/') === 0;
  let url = `/api/download-file?key=${encodeURIComponent(r2Key)}`;
  if (isProtected && myStudentName) url += `&name=${encodeURIComponent(myStudentName)}`;
  // 공개 자료는 단순 이동(브라우저가 attachment 헤더로 자동 다운로드)
  if (!isProtected) { window.location.href = url; return; }
  // 반 전용·리포트 자료는 Authorization 헤더가 필요 → fetch 후 blob 다운로드
  fetch(url, { headers: token ? { 'Authorization': 'Bearer ' + token } : {} })
    .then(r => { if (!r.ok) throw new Error('다운로드 권한이 없습니다.'); return r.blob().then(b => ({ b, r })); })
    .then(({ b, r }) => {
      const cd = r.headers.get('Content-Disposition') || '';
      const m = cd.match(/filename\*=UTF-8''([^;]+)/);
      const fname = (m ? decodeURIComponent(m[1]) : '') || r2Key.split('/').pop();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b); a.download = fname;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
    })
    .catch(err => alert(err.message || '다운로드에 실패했습니다.'));
}

// 결석·병결·공결한 날의 자료 → 인강 신청(승인 후 열림)
async function requestMaterialMakeup(date, btn) {
  if (!date) return;
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) { alert('로그인 후 이용해주세요.'); return; }
  if (btn) btn.disabled = true;
  try {
    const res = await fetch('/api/makeup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ name: myStudentName, date }),
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || '신청에 실패했습니다.'); if (btn) btn.disabled = false; return; }
    alert('인강 신청이 접수되었습니다. 선생님 승인 후 자료가 열립니다.');
    loadFiles();
  } catch (e) { alert('오류: ' + e.message); if (btn) btn.disabled = false; }
}

loadFiles();
</script>
</body>
</html>
