<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>우리 학원 학생 · 이관우 수학연구소</title>
<style>
  :root{ --primary:#862633; --primary-light:#F9ECED; --ink:#1E1E1E; --muted:#777; --border:#EDE0E1; --bg:#FAF7F7; --ai:#1f6f78; --ai-light:#E3F1F2; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--ink); }
  .wrap{ max-width:780px; margin:0 auto; padding:max(18px,env(safe-area-inset-top,18px)) 16px 60px; }
  .top{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:4px; }
  h1{ font-size:1.3rem; margin:6px 0 2px; }
  .sub{ color:var(--muted); font-size:0.82rem; margin-bottom:14px; }
  a.back, .back{ color:var(--primary); text-decoration:none; font-size:0.84rem; font-weight:700; background:none; border:none; cursor:pointer; font-family:inherit; }
  .nav{ display:flex; gap:8px; margin-bottom:13px; flex-wrap:wrap; }
  .nav a{ flex:1; min-width:130px; text-align:center; text-decoration:none; background:#fff; border:1.5px solid var(--border); border-radius:10px; padding:9px 10px; font-weight:700; font-size:0.82rem; color:var(--ink); }
  .nav a.cur{ border-color:var(--primary); background:var(--primary-light); color:var(--primary); }
  .bar{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
  .count{ font-weight:800; font-size:0.98rem; } .count b{ color:var(--primary); }
  .search{ flex:1; min-width:160px; padding:8px 12px; border:1.5px solid var(--border); border-radius:9px; font-size:0.9rem; font-family:inherit; outline:none; }
  .search:focus{ border-color:var(--primary); }

  .card{ background:#fff; border:1px solid var(--border); border-radius:13px; padding:14px 15px; margin-bottom:10px; box-shadow:0 2px 8px rgba(134,38,51,0.04); }
  .chead{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .nm{ font-weight:800; font-size:1.0rem; }
  .cls{ font-size:0.74rem; color:var(--primary); font-weight:700; background:var(--primary-light); padding:2px 8px; border-radius:9px; }
  .meta{ font-size:0.78rem; color:var(--muted); margin-left:auto; }
  .badge{ display:inline-block; font-size:0.68rem; font-weight:700; padding:2px 8px; border-radius:10px; }
  .b-pending{ background:#FFF7E0; color:#B07A00; } .b-ok{ background:#E5F5E8; color:#1F7A33; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:7px 12px; margin-top:11px; }
  .f{ font-size:0.82rem; } .f .k{ color:var(--muted); font-size:0.72rem; display:block; margin-bottom:1px; }
  .f .v{ font-weight:700; } .f .v.empty{ color:#bbb; font-weight:500; }
  .scorebox{ margin-top:11px; background:var(--bg); border-radius:9px; padding:9px 11px; display:grid; grid-template-columns:repeat(auto-fill,minmax(96px,1fr)); gap:6px; }
  .sc{ text-align:center; } .sc .l{ font-size:0.68rem; color:var(--muted); } .sc .g{ font-size:0.98rem; font-weight:800; color:var(--ink); } .sc .g.empty{ color:#ccc; }
  .arow{ margin-top:10px; }
  button.mini{ background:#fff; color:var(--muted); border:1px solid var(--border); border-radius:7px; padding:5px 11px; font-size:0.76rem; font-weight:700; cursor:pointer; font-family:inherit; }
  button.mini:hover{ border-color:var(--primary); color:var(--primary); }
  .attwrap{ margin-top:10px; background:#fff; border:1px dashed var(--border); border-radius:9px; padding:10px 11px; font-size:0.8rem; display:none; }
  .attwrap.show{ display:block; }
  .attin{ border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:9px; }
  .ailabel{ font-weight:800; font-size:0.78rem; color:var(--primary); margin-bottom:7px; }
  .air{ display:flex; gap:7px; align-items:center; flex-wrap:wrap; margin-bottom:7px; }
  .air:last-child{ margin-bottom:0; }
  .aidate{ padding:6px 9px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.82rem; outline:none; }
  .aist{ display:flex; gap:5px; flex-wrap:wrap; }
  .aibtn{ background:#fff; color:var(--muted); border:1.5px solid var(--border); border-radius:8px; padding:6px 11px; font-size:0.8rem; font-weight:700; cursor:pointer; font-family:inherit; }
  .aibtn:hover{ border-color:var(--primary); }
  .aibtn.on{ background:var(--primary); color:#fff; border-color:var(--primary); }
  .aihw{ width:118px; padding:6px 9px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.82rem; outline:none; }
  .aisave{ background:var(--primary); color:#fff; border:none; border-radius:8px; padding:7px 16px; font-size:0.82rem; font-weight:700; cursor:pointer; font-family:inherit; }
  .aisave:hover{ opacity:0.92; } .aisave:disabled{ opacity:0.5; cursor:default; }
  .attsum{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px; }
  .pill{ font-size:0.74rem; font-weight:700; padding:2px 9px; border-radius:9px; background:#F2EDEE; color:var(--ink); }
  .pill.ab{ background:#FBE6E6; color:#b3261e; } .pill.ok{ background:#E5F5E8; color:#1F7A33; } .pill.late{ background:#FFF3DB; color:#B07A00; }
  .pill.cli{ background:var(--ai-light); color:var(--ai); }
  .arow{ display:flex; gap:7px; flex-wrap:wrap; }
  .ailabel2{ font-weight:700; font-size:0.76rem; color:var(--muted); margin-right:1px; }
  .aih,.aim{ width:52px; padding:6px 8px; border:1.5px solid var(--border); border-radius:8px; font-family:inherit; font-size:0.82rem; outline:none; text-align:center; }
  .aih:focus,.aim:focus,.aidate:focus{ border-color:var(--primary); }
  .cliwrap{ margin-top:8px; background:#fff; border:1px dashed var(--ai); border-radius:9px; padding:10px 11px; font-size:0.8rem; display:none; }
  .cliwrap.show{ display:block; }
  .cliwrap .ailabel{ color:var(--ai); }
  .cliwrap .aibtn.on{ background:var(--ai); color:#fff; border-color:var(--ai); }
  .cliwrap .aibtn:hover{ border-color:var(--ai); }
  .cliwrap .aih:focus,.cliwrap .aim:focus,.cliwrap .aidate:focus{ border-color:var(--ai); }
  .cliwrap .aisave{ background:var(--ai); }
  .msg{ background:#fff; border:1px solid var(--border); border-radius:12px; padding:30px 18px; text-align:center; color:var(--muted); }
  .toast{ position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(30,30,30,0.92); color:#fff; padding:11px 18px; border-radius:9px; font-size:0.84rem; font-weight:600; z-index:100; display:none; }
  .toast.show{ display:block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>🎓 우리 학원 학생</h1><div class="sub" id="subTitle">담당 학원 학생만 보여요 · 연락처는 가려집니다</div></div>
    <button class="back" id="backLink" onclick="logout()">로그아웃</button>
  </div>
  <div class="nav">
    <a href="/admin-qna">💬 질문 답변</a>
    <a href="/staff-students" class="cur">🎓 학생</a>
    <a href="/staff-scores">📈 성적</a>
    <a href="/staff-worklog">🗓️ 근무기록</a>
  </div>
  <div class="bar">
    <div class="count" id="count">불러오는 중…</div>
    <input class="search" id="search" placeholder="이름·반 검색" oninput="render()">
  </div>
  <div id="content"><div class="msg">불러오는 중…</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
  var token = sessionStorage.getItem('kwmath_admin_pw') || localStorage.getItem('kwmath_admin_pw') || localStorage.getItem('kwmath_admin_token') || null;
  var students = [], attCache = {};
  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function showToast(m){ var t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2400); }
  function logout(){ sessionStorage.removeItem('kwmath_admin_pw'); localStorage.removeItem('kwmath_admin_pw'); location.href='/portal'; }
  function curMonth(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2); }
  function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }

  async function api(path, opts){
    opts = opts || {}; opts.headers = opts.headers || {};
    if (token) opts.headers['Authorization'] = 'Bearer ' + token;
    opts.credentials = 'same-origin';
    var r = await fetch(path, opts);
    if (r.status === 401){ logout(); throw new Error('401'); }
    return r;
  }

  function val(v){ return v ? '<span class="v">'+esc(v)+'</span>' : '<span class="v empty">—</span>'; }
  function score(label, g){ return '<div class="sc"><div class="l">'+label+'</div><div class="g'+(g?'':' empty')+'">'+esc(g||'—')+'</div></div>'; }

  function cardHtml(s){
    var appr = (s.approvalStatus==='대기중')
      ? '<span class="badge b-pending">승인대기</span>'
      : (s.approvalStatus==='거부' ? '<span class="badge b-pending">거부</span>' : '<span class="badge b-ok">재원</span>');
    return ''+
    '<div class="card">'+
      '<div class="chead">'+
        '<span class="nm">'+esc(s.name||'(이름없음)')+'</span>'+
        (s.className?'<span class="cls">'+esc(s.className)+'</span>':'')+
        appr+
        '<span class="meta">'+esc(s.school||'')+(s.grade?' · '+esc(s.grade):'')+'</span>'+
      '</div>'+
      '<div class="grid">'+
        '<div class="f"><span class="k">현재 수학 등급</span>'+val(s.level)+'</div>'+
        '<div class="f"><span class="k">선행 진도</span>'+val(s.advanceProgress)+'</div>'+
        '<div class="f"><span class="k">약점 단원</span>'+val(s.weakness)+'</div>'+
        '<div class="f"><span class="k">목표 대학</span>'+val(s.dreamUniv)+'</div>'+
      '</div>'+
      '<div class="scorebox">'+
        score('수학 모의', s.mathMockGrade)+
        score('국어 모의', s.korMockGrade)+
        score('영어 모의', s.engMockGrade)+
        score('내신 수학', s.schoolMathGrade)+
      '</div>'+
      '<div class="arow">'+
        '<button class="mini" onclick="toggleAtt(this,\''+esc(s.name).replace(/'/g,"\\'")+'\')">📅 수업 출결</button>'+
        '<button class="mini" onclick="toggleClinic(this,\''+esc(s.name).replace(/'/g,"\\'")+'\')">📋 클리닉</button>'+
      '</div>'+
      '<div class="attwrap" data-name="'+esc(s.name)+'"></div>'+
      '<div class="cliwrap" data-name="'+esc(s.name)+'"></div>'+
    '</div>';
  }

  function render(){
    var q = ($('search').value||'').trim().toLowerCase();
    var list = students.filter(function(s){
      if(!q) return true;
      return (String(s.name||'').toLowerCase().indexOf(q)>=0) || (String(s.className||'').toLowerCase().indexOf(q)>=0);
    });
    var acad = students.length ? (students[0].academy||'') : '';
    $('count').innerHTML = (acad?esc(acad)+' · ':'')+'학생 <b>'+list.length+'</b>명';
    if(!students.length){ $('content').innerHTML = '<div class="msg">담당 학원에 등록된 학생이 없어요.<br><span style="font-size:0.78rem;">(원장이 학원 배정을 안 했거나, 아직 학생이 없는 경우)</span></div>'; return; }
    if(!list.length){ $('content').innerHTML = '<div class="msg">검색 결과가 없어요.</div>'; return; }
    $('content').innerHTML = list.map(cardHtml).join('');
  }

  async function toggleAtt(btn, name){
    var box = btn.closest('.card').querySelector('.attwrap');
    if(box.classList.contains('show')){ box.classList.remove('show'); return; }
    box.classList.add('show');
    if(box.dataset.built==='1') return;
    box.dataset.built='1';
    box.innerHTML =
      '<div class="attin">'+
        '<div class="ailabel">📅 출결 입력</div>'+
        '<div class="air">'+
          '<input type="date" class="aidate" value="'+todayStr()+'">'+
          '<div class="aist">'+
            ['출석','지각','결석','병결','공결'].map(function(s){ return '<button type="button" class="aibtn" data-st="'+s+'">'+s+'</button>'; }).join('')+
          '</div>'+
        '</div>'+
        '<div class="air">'+
          '<input type="number" class="aihw" placeholder="숙제 완료 %" min="0" max="100">'+
          '<button type="button" class="aisave">저장</button>'+
        '</div>'+
      '</div>'+
      '<div class="attsummary">불러오는 중…</div>';
    var btns = box.querySelectorAll('.aibtn');
    btns.forEach(function(b){ b.addEventListener('click', function(){ btns.forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); }); });
    box.querySelector('.aisave').addEventListener('click', function(){ saveAtt(box, name, this); });
    await loadAttSummary(box, name);
  }

  async function loadAttSummary(box, name){
    var sumEl = box.querySelector('.attsummary');
    sumEl.innerHTML = '불러오는 중…';
    try{
      var m = curMonth();
      var r = await api('/api/attendance?name='+encodeURIComponent(name)+'&month='+m);
      var j = await r.json();
      var rec = (j&&j.records)||{};
      var dates = Object.keys(rec).sort();
      if(!dates.length){ sumEl.innerHTML = '<span style="color:#999;">'+m+' 출결 기록 없음</span>'; return; }
      var c={출석:0,지각:0,결석:0,병결:0,공결:0}, hwSum=0, hwN=0;
      dates.forEach(function(d){ var e=rec[d]||{}; if(c[e.status]!==undefined)c[e.status]++; if(typeof e.homework==='number'){hwSum+=e.homework;hwN++;} });
      var pills='<span class="pill ok">출석 '+c.출석+'</span>'+
        (c.지각?'<span class="pill late">지각 '+c.지각+'</span>':'')+
        (c.결석?'<span class="pill ab">결석 '+c.결석+'</span>':'')+
        (c.병결?'<span class="pill">병결 '+c.병결+'</span>':'')+
        (c.공결?'<span class="pill">공결 '+c.공결+'</span>':'');
      var hw = hwN? '<span class="pill">숙제 평균 '+Math.round(hwSum/hwN)+'%</span>':'';
      var days = dates.map(function(d){ var e=rec[d]||{}; return '<div>'+esc(d.slice(5))+' · '+esc(e.status||'-')+(typeof e.homework==='number'?' · 숙제 '+e.homework+'%':'')+(e.note?' · '+esc(e.note):'')+'</div>'; }).join('');
      sumEl.innerHTML = '<div class="attsum">'+pills+hw+'</div><div style="color:var(--muted);line-height:1.7;">'+days+'</div>';
    }catch(e){ sumEl.innerHTML = '<span style="color:#c0392b;">출결을 불러오지 못했어요.</span>'; }
  }

  async function saveAtt(box, name, btnEl){
    var date = (box.querySelector('.aidate').value||'').trim();
    if(!date){ showToast('날짜를 선택해주세요.'); return; }
    var stBtn = box.querySelector('.aibtn.on');
    var status = stBtn ? stBtn.dataset.st : '';
    var hwRaw = (box.querySelector('.aihw').value||'').trim();
    var body = { name: name, date: date };
    if(status) body.status = status;
    if(hwRaw!==''){
      var hw = Number(hwRaw);
      if(!isFinite(hw)||hw<0||hw>100){ showToast('숙제 %는 0~100 사이로 입력해주세요.'); return; }
      body.homework = Math.round(hw);
    }
    if(!body.status && body.homework===undefined){ showToast('출결 상태나 숙제 %를 입력해주세요.'); return; }
    var old = btnEl.textContent; btnEl.disabled=true; btnEl.textContent='저장 중…';
    try{
      var r = await api('/api/attendance', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      var j = await r.json().catch(function(){return {};});
      if(!r.ok){ showToast(j.error||'저장에 실패했어요.'); return; }
      showToast(date.slice(5)+' 저장됐어요.');
      box.querySelectorAll('.aibtn').forEach(function(x){x.classList.remove('on');});
      box.querySelector('.aihw').value='';
      await loadAttSummary(box, name);
    }catch(e){ if(String(e.message)!=='401') showToast('저장 중 오류가 났어요.'); }
    finally{ btnEl.disabled=false; btnEl.textContent=old; }
  }

  function fmtMin(min){ var h=Math.floor(min/60), m=min%60; var s=(h?h+'시간':'')+(m?(h?' ':'')+m+'분':''); return s||'0분'; }

  async function toggleClinic(btn, name){
    var box = btn.closest('.card').querySelector('.cliwrap');
    if(box.classList.contains('show')){ box.classList.remove('show'); return; }
    box.classList.add('show');
    if(box.dataset.built==='1') return;
    box.dataset.built='1';
    box.innerHTML =
      '<div class="attin">'+
        '<div class="ailabel">📋 클리닉 입력</div>'+
        '<div class="air">'+
          '<input type="date" class="aidate" value="'+todayStr()+'">'+
          '<div class="aist">'+
            ['출석','지각','결석','병결','공결'].map(function(s){ return '<button type="button" class="aibtn" data-st="'+s+'">'+s+'</button>'; }).join('')+
          '</div>'+
        '</div>'+
        '<div class="air">'+
          '<span class="ailabel2">성취도</span>'+
          '<div class="aist">'+
            [0,25,50,75,100].map(function(v){ return '<button type="button" class="aibtn" data-ach="'+v+'">'+v+'</button>'; }).join('')+
          '</div>'+
        '</div>'+
        '<div class="air">'+
          '<span class="ailabel2">시간</span>'+
          '<input type="number" class="aih" min="0" max="12" placeholder="0"><span class="ailabel2">시간</span>'+
          '<input type="number" class="aim" min="0" max="60" placeholder="0"><span class="ailabel2">분</span>'+
          '<button type="button" class="aisave">저장</button>'+
        '</div>'+
      '</div>'+
      '<div class="clisummary">불러오는 중…</div>';
    var stBtns = box.querySelectorAll('.aibtn[data-st]');
    stBtns.forEach(function(b){ b.addEventListener('click', function(){ stBtns.forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); }); });
    var achBtns = box.querySelectorAll('.aibtn[data-ach]');
    achBtns.forEach(function(b){ b.addEventListener('click', function(){ achBtns.forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); }); });
    box.querySelector('.aisave').addEventListener('click', function(){ saveClinic(box, name, this); });
    await loadClinicSummary(box, name);
  }

  async function loadClinicSummary(box, name){
    var sumEl = box.querySelector('.clisummary');
    sumEl.innerHTML = '불러오는 중…';
    try{
      var m = curMonth();
      var r = await api('/api/clinic?name='+encodeURIComponent(name)+'&month='+m);
      var j = await r.json();
      var rec = (j&&j.records)||{};
      var dates = Object.keys(rec).sort();
      if(!dates.length){ sumEl.innerHTML = '<span style="color:#999;">'+m+' 클리닉 기록 없음</span>'; return; }
      var c={출석:0,지각:0,결석:0,병결:0,공결:0}, achSum=0, achN=0, minSum=0;
      dates.forEach(function(d){ var e=rec[d]||{}; if(c[e.status]!==undefined)c[e.status]++; if(typeof e.achieve==='number'){achSum+=e.achieve;achN++;} if(typeof e.minutes==='number'){minSum+=e.minutes;} });
      var pills='<span class="pill ok">출석 '+c.출석+'</span>'+
        (c.지각?'<span class="pill late">지각 '+c.지각+'</span>':'')+
        (c.결석?'<span class="pill ab">결석 '+c.결석+'</span>':'')+
        (c.병결?'<span class="pill">병결 '+c.병결+'</span>':'')+
        (c.공결?'<span class="pill">공결 '+c.공결+'</span>':'');
      var extra=(achN?'<span class="pill cli">성취도 평균 '+Math.round(achSum/achN)+'</span>':'')+(minSum?'<span class="pill cli">시간 합계 '+fmtMin(minSum)+'</span>':'');
      var days = dates.map(function(d){ var e=rec[d]||{}; return '<div>'+esc(d.slice(5))+' · '+esc(e.status||'-')+(typeof e.achieve==='number'?' · 성취도 '+e.achieve:'')+(typeof e.minutes==='number'?' · '+fmtMin(e.minutes):'')+(e.note?' · '+esc(e.note):'')+'</div>'; }).join('');
      sumEl.innerHTML = '<div class="attsum">'+pills+extra+'</div><div style="color:var(--muted);line-height:1.7;">'+days+'</div>';
    }catch(e){ sumEl.innerHTML = '<span style="color:#c0392b;">클리닉을 불러오지 못했어요.</span>'; }
  }

  async function saveClinic(box, name, btnEl){
    var date = (box.querySelector('.aidate').value||'').trim();
    if(!date){ showToast('날짜를 선택해주세요.'); return; }
    var stBtn = box.querySelector('.aibtn[data-st].on');
    var achBtn = box.querySelector('.aibtn[data-ach].on');
    var hRaw = (box.querySelector('.aih').value||'').trim();
    var mRaw = (box.querySelector('.aim').value||'').trim();
    var body = { name: name, date: date };
    if(stBtn) body.status = stBtn.dataset.st;
    if(achBtn) body.achieve = Number(achBtn.dataset.ach);
    if(hRaw!=='' || mRaw!==''){
      var hh = hRaw===''?0:Number(hRaw), mm = mRaw===''?0:Number(mRaw);
      if(!isFinite(hh)||hh<0||hh>12){ showToast('시간은 0~12 사이로 입력해주세요.'); return; }
      if(!isFinite(mm)||mm<0||mm>60){ showToast('분은 0~60 사이로 입력해주세요.'); return; }
      body.minutes = Math.round(hh)*60 + Math.round(mm);
    }
    if(!body.status && body.achieve===undefined && body.minutes===undefined){ showToast('출결·성취도·시간 중 하나는 입력해주세요.'); return; }
    var old = btnEl.textContent; btnEl.disabled=true; btnEl.textContent='저장 중…';
    try{
      var r = await api('/api/clinic', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      var j = await r.json().catch(function(){return {};});
      if(!r.ok){ showToast(j.error||'저장에 실패했어요.'); return; }
      showToast(date.slice(5)+' 클리닉 저장됐어요.');
      box.querySelectorAll('.aibtn').forEach(function(x){x.classList.remove('on');});
      box.querySelector('.aih').value=''; box.querySelector('.aim').value='';
      await loadClinicSummary(box, name);
    }catch(e){ if(String(e.message)!=='401') showToast('저장 중 오류가 났어요.'); }
    finally{ btnEl.disabled=false; btnEl.textContent=old; }
  }

  async function boot(){
    if(!token){ logout(); return; }
    try{
      var r = await api('/api/students');
      var j = await r.json();
      students = Array.isArray(j) ? j : [];
      render();
    }catch(e){ if(String(e.message)!=='401') $('content').innerHTML = '<div class="msg">목록을 불러오지 못했어요. 다시 시도해주세요.</div>'; }
  }
  boot();
</script>
</body>
</html>
