<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>페이지를 찾을 수 없습니다 — 관우수학</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,'맑은 고딕','Malgun Gothic',sans-serif;
      background:#0f172a; color:#e2e8f0; text-align:center; padding:max(24px,env(safe-area-inset-top,24px)) 24px 24px; }
    .box { max-width:420px; }
    h1 { font-size:72px; margin:0 0 4px; color:#38bdf8; letter-spacing:2px; }
    h2 { font-size:20px; margin:0 0 12px; font-weight:600; }
    p { font-size:15px; line-height:1.7; color:#94a3b8; margin:0; }
    a { display:inline-block; margin-top:24px; padding:13px 26px; background:#38bdf8; color:#0f172a;
      text-decoration:none; border-radius:10px; font-weight:700; font-size:15px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <h2>페이지를 찾을 수 없어요</h2>
    <p>찾으시는 페이지가 없거나 주소가 바뀌었어요.<br>주소를 다시 확인해 주세요.</p>
    <a href="/">홈으로 돌아가기</a>
  </div>
</body>
</html>
