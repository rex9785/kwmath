<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>알림 진단 · 이관우 수학연구소</title>
<style>
  :root{ --primary:#862633; --primary-light:#F9ECED; --ink:#1E1E1E; --muted:#777; --border:#EDE0E1; --bg:#FAF7F7; --ok:#1F7A33; --warn:#B07A00; --bad:#c0392b; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--ink); }
  .wrap{ max-width:560px; margin:0 auto; padding:max(18px,env(safe-area-inset-top,18px)) 16px 60px; }
  .top{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:4px; }
  h1{ font-size:1.25rem; margin:6px 0 2px; }
  .sub{ color:var(--muted); font-size:0.82rem; margin-bottom:16px; line-height:1.6; }
  a.back{ color:var(--primary); text-decoration:none; font-size:0.84rem; font-weight:700; white-space:nowrap; }

  .card{ background:#fff; border:1px solid var(--border); border-radius:13px; padding:13px 15px; margin-bottom:10px; box-shadow:0 2px 8px rgba(134,38,51,0.04); }
  .chk{ display:flex; align-items:flex-start; gap:11px; }
  .chk .ico{ font-size:1.15rem; line-height:1.5; flex-shrink:0; }
  .chk .body{ flex:1; min-width:0; }
  .chk .lab{ font-weight:800; font-size:0.9rem; }
  .chk .val{ font-size:0.86rem; color:var(--ink); margin-top:1px; word-break:break-word; }
  .chk .hint{ font-size:0.76rem; color:var(--warn); margin-top:5px; line-height:1.6; }

  .actions{ margin-top:16px; display:flex; flex-direction:column; gap:10px; }
  button.big{ width:100%; padding:14px 16px; border-radius:12px; font-size:0.95rem; font-weight:800; cursor:pointer; font-family:inherit; border:none; }
  button.big.primary{ background:var(--primary); color:#fff; }
  button.big.primary:hover{ background:#6f1f2b; }
  button.big.ghost{ background:#fff; color:var(--primary); border:1.5px solid var(--primary); }
  button.big.ghost:hover{ background:var(--primary-light); }
  button.big:disabled{ opacity:.55; cursor:not-allowed; }

  .result{ margin-top:14px; background:#fff; border:1px solid var(--border); border-radius:13px; padding:15px; font-size:0.88rem; line-height:1.75; display:none; }
  .result.show{ display:block; }
  .result h3{ margin:0 0 7px; font-size:0.98rem; }
  .result .raw{ margin-top:10px; padding:9px 11px; background:var(--bg); border-radius:8px; font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.76rem; color:var(--muted); word-break:break-all; white-space:pre-wrap; }
  .result.ok{ border-color:#BFE3C6; } .result.ok h3{ color:var(--ok); }
  .result.warn{ border-color:#F0DEB0; } .result.warn h3{ color:var(--warn); }
  .result.bad{ border-color:#F0C0BA; } .result.bad h3{ color:var(--bad); }
  .steps{ margin:8px 0 0; padding-left:20px; line-height:1.95; }
  .steps li{ margin-bottom:3px; }

  .login{ background:#fff; border:1px solid var(--border); border-radius:14px; padding:24px; max-width:340px; margin:50px auto; text-align:center; }
  .login input{ width:100%; margin:12px 0; padding:10px; border:1px solid var(--border); border-radius:9px; font-size:0.95rem; font-family:inherit; }
  .login button{ background:var(--primary); color:#fff; border:none; border-radius:9px; padding:10px 18px; font-weight:700; cursor:pointer; font-family:inherit; }
  .err{ color:var(--bad); font-size:0.8rem; margin-bottom:6px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>🔔 알림 진단</h1></div>
    <a class="back" href="/admin-qna">← 질문 관리</a>
  </div>
  <div class="sub">알림이 안 오는 진짜 원인을 한 화면에서 확인합니다. <b>꼭 홈 화면에 설치된 앱</b>에서 이 페이지를 열어주세요. (원장 전용)</div>
  <div id="app"></div>
</div>
<script>
  // 원장 비밀번호 = admin token (관리자 세션이면 그대로 재사용). push-send.js는 body.password로 인증.
  var token = sessionStorage.getItem('kwmath_admin_pw') || localStorage.getItem('kwmath_admin_token') || null;
  var ADMIN = '__admin__';   // qna.js의 ADMIN_PUSH_USERS 와 동일해야 함

  function $(id){ return document.getElementById(id); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function u8(b64){ var pad='='.repeat((4-b64.length%4)%4); var s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/'); var raw=atob(s); var o=new Uint8Array(raw.length); for(var i=0;i<raw.length;i++)o[i]=raw.charCodeAt(i); return o; }
  function nowStr(){ var d=new Date(); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2); }
  function shortHost(url){ try{ return new URL(url).host; }catch(_){ return '저장됨'; } }
  function pushSupported(){ return ('serviceWorker' in navigator)&&('PushManager' in window)&&('Notification' in window); }

  // ── 로그인 게이트 ──
  function showLogin(err){
    $('app').innerHTML =
      '<div class="login"><div style="font-weight:700;">관리자 비밀번호</div>'+
      '<input type="password" id="pw" placeholder="비밀번호" onkeydown="if(event.key===\'Enter\')doLogin()">'+
      (err?'<div class="err">'+esc(err)+'</div>':'')+
      '<button onclick="doLogin()">확인</button></div>';
    var p=$('pw'); if(p) p.focus();
  }
  function doLogin(){ var v=($('pw').value||'').trim(); if(!v) return; token=v; sessionStorage.setItem('kwmath_admin_pw',v); renderApp(); }

  // ── 메인 화면 ──
  function renderApp(){
    if(!token){ showLogin(''); return; }
    $('app').innerHTML =
      '<div id="checks"></div>'+
      '<div class="actions">'+
        '<button class="big primary" id="btnTest" onclick="testSend()">🔔 나에게 테스트 알림 보내기</button>'+
        '<button class="big ghost" id="btnPerm" onclick="requestPermDirect()">🧪 권한 직접 요청 (정밀 진단)</button>'+
        '<button class="big ghost" id="btnReset" onclick="resetSub()">♻️ 알림 구독 새로 만들기</button>'+
        '<button class="big ghost" id="btnRe" onclick="runChecks()">🔄 다시 검사</button>'+
      '</div>'+
      '<div class="result" id="result"></div>';
    runChecks();
  }

  function row(ico,lab,val,hint){
    return '<div class="card"><div class="chk"><div class="ico">'+ico+'</div><div class="body">'+
      '<div class="lab">'+esc(lab)+'</div><div class="val">'+esc(val)+'</div>'+
      (hint?'<div class="hint">'+hint+'</div>':'')+
      '</div></div></div>';
  }

  async function runChecks(){
    var out=[];
    // 1) 설치 앱 여부
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone===true;
    out.push(row(standalone?'✅':'⚠️','설치된 앱에서 열기', standalone?'홈 화면 앱으로 열림':'브라우저 탭으로 열림',
      standalone?'':'안드로이드는 <b>홈 화면에 설치한 앱</b>에서 열어야 알림이 안정적이에요. 포털 → "📲 앱 설치" 후 그 앱에서 여세요.'));
    // 2) 브라우저 지원
    var sup=pushSupported();
    out.push(row(sup?'✅':'⛔','브라우저 알림 지원', sup?'지원함':'이 브라우저는 푸시 미지원',
      sup?'':'크롬 또는 삼성인터넷 최신 버전에서 열어주세요.'));
    // 3) 알림 권한
    var perm = (window.Notification && Notification.permission) || 'unsupported';
    var permTxt = ({granted:'허용됨 (granted)', 'default':'아직 안 정함 (default)', denied:'차단됨 (denied)'})[perm] || perm;
    var permIco = perm==='granted'?'✅':(perm==='denied'?'⛔':'⚠️');
    var permHint = perm==='granted' ? '' :
      (perm==='denied'
        ? '폰이 알림을 <b>차단</b>한 상태예요. 설정→애플리케이션→이관우 수학연구소→알림 켜기, 그리고 같은 화면의 <b>"사용하지 않는 앱 권한 삭제"를 꺼주세요.</b>'
        : '아직 "허용"을 누르지 않은 상태예요. 아래 <b>"알림 구독 새로 만들기"</b>를 누르면 허용 창이 떠요.');
    out.push(row(permIco,'알림 권한', permTxt, permHint));
    // 4) 서비스워커
    var swTxt='없음', swIco='⛔';
    try{ var reg=await navigator.serviceWorker.ready; if(reg&&reg.active){ swTxt='작동 중'; swIco='✅'; } }catch(_){}
    out.push(row(swIco,'서비스워커', swTxt, swIco==='✅'?'':'페이지를 새로고침해 보세요. 그래도 없으면 앱 데이터 삭제 후 다시 설치하세요.'));
    // 5) 이 기기 구독
    var subTxt='없음', subIco='⚠️';
    try{ var reg2=await navigator.serviceWorker.ready; var s=await reg2.pushManager.getSubscription(); if(s){ subTxt='있음 · '+shortHost(s.endpoint); subIco='✅'; } }catch(_){}
    out.push(row(subIco,'이 기기 구독', subTxt, subIco==='✅'?'':'구독이 없어요. 아래 <b>"알림 구독 새로 만들기"</b>를 누르세요.'));
    // 6) 서버 VAPID 키
    var vTxt='확인 중…', vIco='⏳';
    try{
      var vr=await fetch('/api/push-vapid-public');
      if(vr.ok){ var vd=await vr.json(); if(vd&&vd.publicKey){ vTxt='설정됨'; vIco='✅'; } else { vTxt='키 없음'; vIco='⛔'; } }
      else { vTxt='미설정 (서버 503)'; vIco='⛔'; }
    }catch(_){ vTxt='확인 실패'; vIco='⛔'; }
    out.push(row(vIco,'서버 VAPID 키', vTxt, vIco==='✅'?'':'Cloudflare에 <b>VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY</b> 환경변수가 없어요. 이게 없으면 알림이 절대 안 옵니다.'));

    $('checks').innerHTML = out.join('');
  }

  function setResult(cls, title, html){
    var r=$('result'); if(!r) return;
    r.className='result show '+(cls||'');
    r.innerHTML = (title?'<h3>'+title+'</h3>':'') + (html||'');
    try{ r.scrollIntoView({behavior:'smooth', block:'center'}); }catch(_){ }
  }

  // ── 핵심: 나에게 테스트 발송 → 결과로 원인 확정 ──
  async function testSend(){
    var b=$('btnTest'); if(b){ b.disabled=true; b.textContent='⏳ 보내는 중…'; }
    setResult('', '⏳ 서버로 테스트 알림을 보내는 중…', '');
    var res, data, txt='';
    try{
      res = await fetch('/api/push-send', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ password:token, userId:ADMIN, title:'🔔 테스트 알림', body:'이게 보이면 알림 정상! ('+nowStr()+')', url:'/admin-qna.html', tag:'kwmath-test' })
      });
      txt = await res.text();
      try{ data = JSON.parse(txt); }catch(_){ data={}; }
    }catch(e){
      setResult('bad','❌ 서버에 연결하지 못했어요','네트워크 상태를 확인하고 다시 시도해 주세요.<div class="raw">'+esc((e&&e.message)||e)+'</div>');
      if(b){ b.disabled=false; b.textContent='🔔 나에게 테스트 알림 보내기'; } return;
    }
    interpret(res.status, data, txt);
    if(b){ b.disabled=false; b.textContent='🔔 나에게 테스트 알림 보내기'; }
    runChecks();
  }

  function interpret(status, d, raw){
    var rawBox = '<div class="raw">HTTP '+status+' · '+esc(raw||JSON.stringify(d)).slice(0,300)+'</div>';
    // 인증 실패
    if(status===401){
      setResult('bad','🔑 비밀번호가 일치하지 않아요',
        '입력한 값이 <b>원장 비밀번호</b>와 달라요. 조교 계정으로 로그인했다면 이 진단은 원장 비번으로만 됩니다.'+rawBox); return;
    }
    // VAPID 미설정 → 서버 원인 확정
    if(status===503 || (d&&d.error&&/VAPID/i.test(d.error))){
      setResult('bad','🛠️ 원인 확정 — 서버에 VAPID 키가 없습니다',
        '<b>이게 알림이 안 오던 핵심 원인일 가능성이 큽니다.</b> 서버(Cloudflare)에 푸시 발송용 키가 설정돼 있지 않아요. 아래대로 한 번만 넣으면 됩니다:'+
        '<ol class="steps">'+
        '<li>Cloudflare 대시보드 → <b>Workers &amp; Pages → kwmath</b></li>'+
        '<li><b>Settings → Variables and Secrets(환경변수)</b></li>'+
        '<li><b>VAPID_PUBLIC_KEY</b>, <b>VAPID_PRIVATE_KEY</b>, <b>VAPID_SUBJECT</b>(mailto:rex9785@gmail.com) 추가</li>'+
        '<li>저장 후 <b>재배포</b>(GitHub Desktop으로 한 번 push 또는 Retry deployment)</li>'+
        '</ol>키 쌍이 없다면 새로 만들어 드릴 수 있어요. "VAPID 키 만들어줘"라고 말씀해 주세요.'+rawBox); return;
    }
    // 구독자 없음
    if(d && d.ok && d.sent===0 && (d.note==='구독자 없음' || (!d.fails && !d.cleanedExpired))){
      setResult('warn','📭 이 기기 구독이 서버에 없습니다',
        '서버는 정상인데, <b>__admin__</b> 으로 저장된 구독이 없어요. 아래 <b>"알림 구독 새로 만들기"</b>를 누른 뒤 다시 테스트하세요.'+rawBox); return;
    }
    // 발송 성공
    if(d && d.ok && d.sent>=1){
      var permOk = !(window.Notification) || Notification.permission==='granted';
      if(!permOk){
        setResult('warn','📨 서버는 보냈지만(sent: '+d.sent+') 배너는 안 뜹니다 — 권한이 원인',
          '이 기기 <b>알림 권한이 아직 "허용"이 아니에요(default)</b>. 그래서 발송은 돼도 화면에 안 떠요. 순서대로 한 번만:'+
          '<ol class="steps">'+
          '<li>설정→앱→이관우 수학연구소에서 <b>"사용하지 않는 앱 권한 삭제" 끄기</b> (자동 회수 방지)</li>'+
          '<li>아래 <b>"♻️ 알림 구독 새로 만들기"</b> 탭 → 뜨는 창에서 <b>"허용"</b></li>'+
          '<li>위 "알림 권한"이 ✅로 바뀌면 다시 <b>"테스트 알림 보내기"</b></li>'+
          '</ol>'+rawBox); return;
      }
      setResult('ok','✅ 서버 정상 발송 + 권한 허용됨 (sent: '+d.sent+')',
        '<b>몇 초 안에 알림 배너가 떠야 정상입니다.</b><br>'+
        '여기까지 ✅인데 <b>배너만 안 뜬다면</b> 원인은 <b>폰의 절전·배터리</b>뿐입니다:'+
        '<ol class="steps">'+
        '<li>설정 → 애플리케이션 → <b>이관우 수학연구소</b> → 배터리 → <b>"제한 없음"</b></li>'+
        '<li>설정 → 배터리 → <b>절전 모드 끄기</b>, "잠자기 앱"·"딥 슬립 앱"에서 제외</li>'+
        '<li>방해 금지(DND)·무음 시간대 확인</li>'+
        '</ol>'+rawBox); return;
    }
    // 발송 시도했으나 실패
    if(d && d.ok && d.sent===0 && d.fails>=1){
      if(d.cleanedExpired>=1){
        setResult('warn','♻️ 구독이 만료돼 폐기됐습니다',
          '폰이 기존 구독을 회수했어요(만료). 방금 자동 정리했으니, <b>"알림 구독 새로 만들기"</b>를 누른 뒤 다시 테스트하세요.'+rawBox); return;
      }
      setResult('bad','⚠️ 푸시 서버가 발송을 거부했습니다',
        '구독은 있는데 발송이 거부됐어요. <b>VAPID 공개키와 사설키 짝이 맞지 않을</b> 가능성이 큽니다(서로 다른 쌍을 넣은 경우). 키 쌍을 다시 확인해 주세요.'+rawBox); return;
    }
    // 그 외
    setResult('warn','결과를 받았어요',
      '아래 원본을 확인해 주세요. 해석이 필요하면 그대로 알려주세요.'+rawBox);
  }

  // ── 권한 직접 요청 (subscribe 우회, 권한 그랜트만 정밀 확인) ──
  async function requestPermDirect(){
    var b=$('btnPerm'); if(b){ b.disabled=true; b.textContent='⏳ 요청 중…'; }
    if(!window.Notification){ setResult('bad','⛔ 이 브라우저는 알림 미지원',''); if(b){b.disabled=false;b.textContent='🧪 권한 직접 요청 (정밀 진단)';} return; }
    var standalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone===true;
    var before = Notification.permission, after = before;
    try{
      var p = Notification.requestPermission();
      if(p && typeof p.then==='function'){ after = await p; }
      else { after = Notification.permission; }
    }catch(e){
      setResult('bad','❌ 권한 요청 중 오류',esc((e&&e.message)||e));
      if(b){b.disabled=false;b.textContent='🧪 권한 직접 요청 (정밀 진단)';} return;
    }
    var rawBox = '<div class="raw">요청 전: '+before+' → 요청 후: '+after+(standalone?' · 설치앱':' · 브라우저탭')+'</div>';
    if(after==='granted'){
      setResult('ok','✅ 권한이 "허용"으로 바뀌었습니다',
        '드디어 권한이 잡혔어요! 이제 <b>"♻️ 알림 구독 새로 만들기"</b> → <b>"🔔 테스트 알림 보내기"</b> 순서로 눌러 확인하세요.'+rawBox);
    } else if(after==='denied'){
      setResult('bad','⛔ 권한이 "차단"입니다 — 사이트 설정에서 풀어주세요',
        '폰이 이 사이트 알림을 차단했어요. 크롬에서 직접 풀어야 합니다:'+
        '<ol class="steps">'+
        '<li>크롬 주소창 왼쪽 <b>자물쇠(🔒)</b> 탭 → <b>권한(사이트 설정)</b></li>'+
        '<li><b>알림</b>을 <b>허용</b>으로 변경</li>'+
        '<li>이 화면으로 돌아와 다시 <b>"권한 직접 요청"</b></li>'+
        '</ol>'+rawBox);
    } else {
      // 여전히 default → 폰이 권한을 즉시 회수하거나 WebAPK 상태 꼬임 → 동기화 강제 후 클린 재설치
      setResult('bad','🚨 "허용"을 눌러도 안 잡힙니다 (default 고정)'+(standalone?'':' — 게다가 지금 "브라우저 탭"이에요'),
        (standalone?'' :
         '<b>가장 먼저:</b> 지금 크롬 <b>탭</b>에서 열고 있어요. 탭에서 준 권한은 <b>설치된 앱과 별개</b>라 소용이 없어요. 반드시 <b>홈 화면의 설치된 앱</b>으로 이 페이지를 열고 다시 해보세요.<br><br>')+
        '설치앱인데도 default로 돌아온다면, 폰이 권한을 <b>즉시 회수</b>하거나 앱(WebAPK) 상태가 꼬인 거예요. 아래를 <b>위에서부터 차례로</b> 하나씩, 할 때마다 다시 "권한 직접 요청":'+
        '<ol class="steps">'+
        '<li><b>알림 껐다 켜기</b>: 설정→앱→이관우 수학연구소→알림 → 껐다가 다시 켜기 <i>(권한 재동기화 강제)</i></li>'+
        '<li>같은 화면에서 <b>"사용하지 않는 앱 권한 삭제" 끄기</b> <i>(자동 회수 차단)</i></li>'+
        '<li>그래도 default면 → 앱 <b>제거</b> → 크롬에서 kwmath.co.kr 접속 → 주소창 <b>🔒 → 사이트 설정 → 데이터 삭제</b></li>'+
        '<li>크롬 메뉴 → <b>"홈 화면에 추가"</b>로 앱 새로 설치 → 새 앱에서 <b>"권한 직접 요청"</b> → 허용</li>'+
        '</ol>'+rawBox);
    }
    if(b){b.disabled=false;b.textContent='🧪 권한 직접 요청 (정밀 진단)';}
    runChecks();
  }

  // ── 구독 강제 재설정 (desync·없음 복구) ──
  async function resetSub(){
    var b=$('btnReset'); if(b){ b.disabled=true; b.textContent='⏳ 새로 만드는 중…'; }
    try{
      if(!pushSupported()){ setResult('bad','⛔ 이 브라우저는 알림 미지원',''); return; }
      if(Notification.permission==='denied'){
        setResult('bad','⛔ 알림이 차단돼 있어요',
          '먼저 폰에서 차단을 풀어야 해요:'+
          '<ol class="steps"><li>설정 → 애플리케이션 → 이관우 수학연구소 → <b>알림 허용</b></li>'+
          '<li>같은 화면 <b>"사용하지 않는 앱 권한 삭제" 끄기</b></li>'+
          '<li>이 화면으로 돌아와 다시 누르기</li></ol>'); return;
      }
      var reg=await navigator.serviceWorker.ready;
      var old=await reg.pushManager.getSubscription();
      if(old){
        try{ await old.unsubscribe(); }catch(_){}
        try{ await fetch('/api/push-subscribe',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:ADMIN,endpoint:old.endpoint})}); }catch(_){}
      }
      var vr=await fetch('/api/push-vapid-public'); var vd=await vr.json();
      if(!vd||!vd.publicKey){ setResult('bad','🛠️ 서버 VAPID 키가 없어 구독을 만들 수 없어요','위 "테스트 알림 보내기" 결과의 안내대로 환경변수를 먼저 설정하세요.'); return; }
      var sub;
      try{ sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:u8(vd.publicKey)}); }
      catch(err){
        if(Notification.permission==='denied') setResult('bad','⛔ 권한이 거부됐어요','설정에서 알림을 허용한 뒤 다시 시도하세요.');
        else setResult('warn','⚠️ 권한 창에서 "허용"을 눌러주세요','다시 한 번 눌러주세요.');
        return;
      }
      var sr=await fetch('/api/push-subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:ADMIN, subscription:sub.toJSON()})});
      if(!sr.ok){ setResult('bad','❌ 구독 저장 실패','서버에 저장하지 못했어요. 잠시 후 다시 시도하세요.'); return; }
      setResult('ok','✅ 새 구독을 만들었어요','이제 위의 <b>"🔔 나에게 테스트 알림 보내기"</b>를 눌러 확인하세요.');
    }catch(e){
      setResult('bad','❌ 오류',esc((e&&e.message)||e));
    }finally{
      if(b){ b.disabled=false; b.textContent='♻️ 알림 구독 새로 만들기'; }
      runChecks();
    }
  }

  renderApp();
</script>
